g desire to advance skills related to WSP's work and projects.Competent interpersonal and communication skills when interacting with others, expressing ideas effectively and professionally to an engineering and non-engineering audience.Capable of taking direction from leadership, mentors, and managers to executive projects.Basic proficiency with technical writing, office automation, software, spreadsheets, technology, and tools.Proven track record of upholding workplace safety and ability to abide by WSP's health, safety and drug/alcohol and harassment policies.Authorization to work in the United States at the start of the internship. Preferred QualificationsPrior internship and leadership involvement on campus. About WSP ABOUT US WSP USA is the U.S. operating company of WSP, one of the world's leading engineering and professional services firms. Dedicated to serving local communities, we are engineers, planners, technical experts, strategic advisors and construction management professionals. WSP USA designs lasting solutions in the buildings, transportation, energy, water and environment markets. With more than 15,000 employees in over 300 offices across the U.S., we partner with our clients to help communities prosper.www.wsp.comWSP provides a flexible and agile workplace model while meeting client needs. Employees are also afforded a comprehensive suite of benefits including medical, dental, vision, disability, life, and retirement savings focused on providing health and financial stability throughout the employee's career.At WSP, we want to give our employees the challenges they seek to grow their careers and knowledge base. Your daily contributions to your team will be essential in meeting client objectives, goals and challenges. Are you ready to get started?WSP USA (and all of its U.S. companies) is an Equal Opportunity Employer Race/Age/Color/Religion/Sex/Sexual Orientation/Gender Identity/National Origin/Disability or Protected Veteran Status.The selected candidate must be authorized to work in the United States.NOTICE TO THIRD PARTY AGENCIES:WSP does not accept unsolicited resumes from recruiters, employment agencies, or other staffing services. Unsolicited resumes include any resume or hiring document sent to WSP in the absence of a signed Service Agreement where WSP has expressly requested recruitment/staffing services specific to the position at hand. Any unsolicited resumes, including those submitted to hiring managers or other business leaders, will become the property of WSP and WSP will have the right to hire that candidate without reservation – no fee or other compensation will be owed or paid to the recruiter, employment agency, or other staffing service."}, {"job_title": "Civil Engineering Intern - Summer 2026", "company_name": "AtkinsRéalis", "city": "Austin", "state": "TX", "employment_type": "PART_TIME", "salary_currency": "USD", "salary_min": 25.0, "salary_max": 31.0, "salary_interval": "HOUR", "posted_date": "2026-03-19T00:00:00", "description_text": "Overview: AtkinsRéalis is seeking a Civil Engineering Intern - Summer 2026 to join our Austin, TX office. YOUR ROLE: Gathers, logs and summarizes field notes or other data to be used by technicians or professionals in technical studies or projects. Establishes and maintains records or files of technical data or documents. Performs mathematical calculations. Performs various routine drafting and CAD assignments. Assists in the preparation of graphic displays and presentation materials. Performing other duties as the supervisor may from time to time deem necessary. About You - Experience: No experience required. Education: College junior or senior working towards completing a civil engineering degree from an ABET accredited program by the start of the internship. Special Skills: AutoCAD. Professional Registrations: Student involvement with ASCE chapter preferred. Reward & Benefits: AtkinsRéalis offers competitive salary, hands-on experience with industry leaders, support and mentorship from various professionals, career and educational exploration opportunities such as Client Site Visits, Weekly Lunch & Learns, & various virtual and/or in-person activities. Additional benefits may include medical, dental, vision, company-paid life and short- and long-term disability benefits, employer-matched 401(k) with 100% vesting, employee stock purchase plan, Paid Time Off, leaves of absences options, flexible work options, recognition and employee satisfaction programs, employee assistance program, and voluntary benefits. Expected compensation range is between $25 - $31 hourly depending on skills, experience, and geographical location."}, {"job_title": "Water Resource Intern - Blaine", "company_name": "Central Minnesota Jobs and Training Services, Inc.", "city": "Blaine", "state": "MN", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-19T00:00:00", "description_text": "Central Minnesota Jobs and Training Services, Inc. - Water Resource Intern - Blaine\n\nJob Posting\nUnder the general direction of the Stormwater Coordinator, this position is responsible for assisting in water resources management and engineering related work in the field (75%) and office (25%). Performs work plan schedules, project reviews, inspections, and follow-up documentation preparation.\n\nMinimum Requirements:\n- High school diploma or G.E.D.\n- Valid Class D driver's license.\n\nDesirable Requirements:\n- Three years' experience with Microsoft Office software including Word and Excel.\n- Currently at least a junior in standing at a college or university with a declared major in Stormwater Management, Civil Engineering, Environmental Engineering, Water Resources, or related field.\n- Municipal engineering and/or inspection experience.\n- Experience operating AutoCAD and ERSI software products (ArcGIS)."}, {"job_title": "Intern/Co-Op – Environmental, Civil, or Chemical Engineering", "company_name": "Geosyntec Consultants", "city": "Phoenix", "state": "AZ", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-19T00:00:00", "description_text": "Do you want to build an impactful career to change the world for the better? Geosyntec has an exciting opportunity for an Intern/Co-Op in Environmental, Civil, or Chemical Engineering in our Phoenix, AZ office.\n\nPosition Overview:\nThe position offers the opportunity to apply engineering (environmental, civil, geotechnical, chemical, and water resources) academic knowledge to real-world situations while also learning the business skills needed for a successful consulting career. The position has a flexible part- or full-time schedule (15 - 40 hours/week) for approximately 12 weeks (with extension options possible) during summer of 2026. Preferred candidates would have the ability to return to the position for up to two additional semester rotations during their undergraduate or graduate studies.\n\nEssential Duties and Responsibilities:\n- Fieldwork such as soil and groundwater sampling, stormwater inspections, remediation system operation and monitoring, drilling, and contractor oversight\n- Data input and analysis, including preparing maps, tables, and figures\n- Assist with engineering calculations using computer-based technical tools\n- Technical writing of reports, letters, memoranda, plans, specifications, and proposals\n- Follow instructions and interact with engineers, geologists, scientists (modelers, chemists, biologists), GIS and CADD professionals, office administrative staff, contractors and construction personnel\n- Local travel or driving to project sites as needed\n\nEducation and Licensure:\n- Currently registered in a Bachelor's or Master's university degree program in a relevant discipline (required)\n- Degree focus area in environmental, civil, geotechnical, chemical, or water resources engineering preferred\n- Highly qualified candidates in geology, natural sciences, or chemistry programs will be considered\n\nSkills, Experience and Qualifications:\n- Experience with Microsoft Excel (required)\n- Python, hydrological models (e.g., MODFLOW), GIS (e.g., ArcView), CADD (e.g., AutoCAD), and/or other software relevant to the field (preferred)\n- Previous experience performing outdoor fieldwork (preferred)\n- Valid U.S. driver's license and a satisfactory driving record for business travel to project sites (required)\n- Reliable personal transportation\n\nJob ID: 2026-4256"}, {"job_title": "Civil Engineering Analyst", "company_name": "Kimley-Horn", "city": "Dallas", "state": "TX", "employment_type": "FULL_TIME", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-19T00:00:00", "description_text": "Kimley-Horn - Civil Engineering Analyst\n\nOverview\nKimley-Horn is looking for Engineering graduates to join our Dallas, Texas (TX) office in 2026! This is not a remote position.\n\nResponsibilities:\n- Utilize technical software programs on a regular basis to analyze, produce, and QC deliverables for our clients.\n- Contribute to the pre-construction civil engineering design, planning, modification, permitting, and analysis for multiple projects ranging in size and scope.\n- Solve complex problems, assist project managers, and collaborate across disciplines to produce our clients' visions for the future built environment.\n- Develop familiarity with the federal, state, and local regulations, as well as Kimley-Horn's and our client's practices, procedures, and standards.\n- Analysts will learn one or more software programs specific to their disciplines: AutoCAD, Civil 3D, Excel, Microstation, VISSIM, Open Roads, Synchro and/or GIS.\n\nQualifications:\n- An ABET accredited engineering degree (Bachelors or Masters) by Summer 2026 in one of the following majors:\n  - Civil and/or Environmental Engineering\n  - Mechanical, Electrical, Biological, Biosystems, Chemical, or Agricultural Engineering\n  - Engineering Technology\n\nWhy Kimley-Horn?\nAt Kimley-Horn, we do things differently. People, clients, and employees are at the forefront of who we are. Clients know we prioritize achieving their goals and growing their success. Employees know our culture and approach to business are built on a desire to provide an environment for everyone to flourish. We take pride in how our employee retention, robust benefits package, and company values have led to Kimley-Horn's placement on the Fortune \"100 Best Companies to Work\" list for 18 years!\n\nKey Benefits at Kimley-Horn:\n- Exceptional Retirement Plan: 2-to-1 company match on up to 4% of eligible compensation (salary + bonus) and additional profit-sharing contribution.\n- Comprehensive Health Coverage: Low-cost medical, dental, and vision insurance options.\n- Time Off: Personal leave, flexible scheduling, floating holidays, and half-day Fridays.\n- Financial Wellness: Student loan matching in our 401(k), and performance-based bonuses.\n- Professional Development: Tuition reimbursement and extensive internal training programs.\n- Family-Friendly Benefits: New Parent Leave, family building benefits, and childcare resources."}, {"job_title": "Civil Engineering Intern, Water Resources", "company_name": "Michael Baker International", "city": "Chicago", "state": "IL", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 20.0, "salary_max": 25.0, "salary_interval": "HOUR", "posted_date": "2026-03-19T00:00:00", "description_text": "Michael Baker International is seeking a Civil Engineering Intern for our Water group in the Chicago, IL office. Students will have the opportunity to gain technical experience supporting water, wastewater, and surface water projects. Students will work alongside Project Managers and Licensed Engineers on a range of planning and design projects from municipal engineering services to dam/levee inspection and rehabilitation.\n\nWATER PRACTICE:\nConsistently ranked by Engineering News-Record as a Top 10 water firm, Michael Baker International offers clients an integrated team of professionals that provide innovative consulting, planning and engineering solutions for the entire spectrum of the water cycle.\n\nResponsibilities:\n- Accompany staff during assessment or inspection of water, wastewater, and surface water facilities\n- Support engineering analysis and design, including use of software or calculation sheets to complete hydrology/hydraulics analysis, and design drawings\n- Support with preparation of design reports, technical memorandums, and construction specifications\n- Conduct data entry and analysis\n- Support quantity take-off, cost estimate preparation, and material/equipment cost solicitation\n- Assist with field documentation, report generation, and administrative tasks as assigned\n\nProfessional Requirements:\n- Enrolled in a Bachelor or Master's degree program in Civil/Environmental Engineering with at least 1 year of college coursework\n- Interest in/prior internship in civil engineering\n- Experience with AutoCAD, MicroStation, or other drafting software preferred but not required\n- Excellent English language skills, both written and verbal including technical writing\n- Must have strong organizational skills\n- Proficiency with Microsoft Office (MS Excel, MS Word, PowerPoint)\n\nCompensation:\n- The approximate compensation range for this position is $20.00 to $25.00 per hour\n\nJob ID: 308583"}, {"job_title": "Civil Engineering Intern – Dams", "company_name": "Schnabel Engineering", "city": "Helena", "state": "MT", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 18.0, "salary_max": 25.0, "salary_interval": "HOUR", "posted_date": "2026-03-19T00:00:00", "description_text": "Schnabel is an employee-owned, professional engineering and consulting firm that focuses on solving problems related to the earth and environment through specialization in geotechnical, geostructural, tunnel, and dam engineering. Schnabel is an ENR Top 500 Design Firm with 700+ employees in 31 offices throughout the United States.\n\nRecognized by CE News as one of the Best Engineering Firms to Work for, Schnabel provides employees with a competitive benefits package including maternity leave, tuition reimbursement, health, dental, life and disability insurance and a wellness program. As an employee-owned company, through the Employee Stock Ownership Plan, Schnabel employees directly benefit from the success of our growing firm.\n\nJob Description\nAre you looking for interesting and meaningful work, a fun atmosphere, and opportunities to learn, grow, and excel? The Helena, Montana office is seeking a temporary full-time intern with a Civil Engineering background to support our growing business. The full-time position is expected to be held from May through August of 2026.\n\nJob Responsibilities\nAssisting in performing hydrology and hydraulic design; structural design; geotechnical investigations and analyses; mechanical system analysis; and drafting using AutoCAD\nReviewing construction plans and technical specifications\nDrafting, compiling, and proofreading reports\nAssist with development of standard calculation templates using primarily Mathcad and Excel\nAssistance with administrative work\nSome travel may be required\n\nRequired Skills/Experience\nCurrent enrollment in an ABET-accredited Civil Engineering Bachelor's program\nPossess good oral and written communication skills and literacy in the Microsoft Office suite of programs\nAbility to work with direction as part of a team\nWillingness to perform a variety of tasks including office and field work\nA strong work ethic and the desire to perform professionally at a high level.\nAbility to routinely lift up to 50 pounds\n\nPreferred Skills/Experience\nPrior professional work or summer intern work in a related field\nJunior, senior, and graduate students\n\nOther Requirements\nMust possess a valid driver's license\nAbility to pass a background check\nAbility to pass a pre-employment drug screening\n\nCompensation Range: $18.00 to $25.00 per hour"}, {"job_title": "Civil Engineering Intern - Summer 2026", "company_name": "WSP in the U.S.", "city": "Austin", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 23.9, "salary_max": 31.11, "salary_interval": "HOUR", "posted_date": "2026-03-19T00:00:00", "description_text": "WSP in the U.S. - Civil Engineering Intern - Summer 2026\n\nThis Opportunity\nWSP USA hosts hundreds of interns across the United States to gain hands-on, meaningful work experience to enhance their education and professional aptitude. Our interns gain exposure to real projects while working side by side with senior staff. Through our Developing Professionals Network, interns gain mentorship, networking opportunities and lifelong career connections.\n\nOur Earth & Environment (E&E) Civil Engineering Team is seeking a full-time Civil Engineering Intern - Summer 2026 to work out of our Austin, TX office. This temporary position is seeking individuals currently enrolled in an Undergraduate or Graduate degree program.\n\nThis 12-week internship will be part of the WSP Summer Internship Program that is scheduled to start on May 18th, 2026. The individual start date of the internship may be flexible.\n\nYour Impact\n- Support a variety of engineering tasks with the goal to develop technical, social, and ethical skills.\n- Learn basic principles of Civil Engineering.\n- Assist with project research, field work, and preliminary design calculations and analysis.\n- Support preparation of final design plans, special provisions, and cost estimates.\n- Assist in collecting and maintaining project documentation.\n- Complete training on assigned tasks.\n- Exercise responsible and ethical decision-making regarding company funds, resources and conduct, and adhere to WSP's Code of Conduct and related policies and procedures.\n- Perform additional responsibilities as required by business needs.\n\nPlease note that there is no relocation or housing assistance associated with this internship.\n\nWho You Are\nRequired Qualifications:\n- Actively enrolled in an accredited Civil Engineering, Environmental Engineering, Biological Engineering, or related, Undergraduate program with an anticipated graduation date of August 2026 or later.\n- Must be 18 or older.\n- Demonstrated interest in Civil Engineering, or related field, and have a strong desire to advance skills related to WSP's work and projects.\n- Competent interpersonal and communication skills when interacting with others, expressing ideas effectively and professionally to an engineering and non-engineering audience.\n- Capable of taking direction from leadership, mentors, and managers to executive projects.\n- Basic proficiency with technical writing, office automation, software, spreadsheets, technology, and tools.\n- Experience using Excel, AutoCAD (or CAD) and/or Civil3D.\n- Proven track record of upholding workplace safety and ability to abide by WSP's health, safety and drug/alcohol and harassment policies.\n- Authorization to work in the United States at the start of the internship.\n\nPreferred Qualifications:\n- Actively enrolled in an accredited Civil Engineering, Environmental Engineering, Biological Engineering or related, Masters or PhD program with an anticipated graduation date of August 2026 or later.\n- Experience using ArcGIS.\n- Prior internship and leadership involvement on campus.\n\nCompensation: Expected Salary (all locations): $23.90 - $31.11"}, {"job_title": "Civil Engineering Intern - Water/Wastewater", "company_name": "AECOM", "city": "Florence", "state": "SC", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 20.0, "salary_max": 25.0, "salary_interval": "HOUR", "posted_date": "2026-03-18T00:00:00", "description_text": "Company Description: Work with Us. Change the World. At AECOM, we're delivering a better world. Whether improving your commute, keeping the lights on, providing access to clean water, or transforming skylines, our work helps people and communities thrive. We are the world's trusted infrastructure consulting firm, partnering with clients to solve the world's most complex challenges and build legacies for future generations. There has never been a better time to be at AECOM. With accelerating infrastructure investment worldwide, our services are in great demand. Job Description: AECOM is seeking a Civil Engineering Intern - Water/Wastewater to be based in Florence, South Carolina. This position is expected to begin in May 2026 and end in August 2026. This is an incredible opportunity to support our engineering and project management teams. The role provides hands-on experience in both field and office environments, offering exposure to real-world infrastructure, construction, and design projects. Under the guidance of licensed professional engineers, the intern will assist with design work, data analysis, field inspections, and project documentation. The responsibilities of this position include, but are not limited to: Assist in preparing engineering drawings, plans, and specifications using AutoCAD, Civil 3D, or similar software. Support engineers by performing basic calculations, design modeling, and drafting. Participate in site visits, inspections, and field investigations. Collect and document field data including measurements, photographs, material samples, surveys, and test results. Prepare and update engineering reports, meeting minutes, project logs, and technical memos. Organize plans, specification documents, and submittals to ensure accuracy and completeness. Support project teams with quantity takeoffs, cost estimates, and bid documentation. Work closely with project managers, engineers, contractors, and other stakeholders. Participate in team meetings and contribute to discussions regarding design solutions and project challenges. Provide clear written and verbal updates on assignments. Follow company and site-specific safety protocols during field activities. Support QA/QC efforts during design and construction phases. Qualifications: Minimum Requirements: Currently pursuing a Bachelor's degree in Civil Engineering or Environmental Engineering. Must have completed at least 1 year of study. Valid U.S. Driver's License required to visit project sites, clients, and other AECOM offices. Due to the nature of work, US Citizenship is required. Ability to lift equipment and conduct site walks as needed. Preferred: Basic knowledge of engineering principles and construction practices. Proficiency in Microsoft Office programs. Familiarity with AutoCAD, Civil 3D, MicroStation, or other design software. Strong analytical, organizational, and problem-solving skills. Ability to work independently and collaboratively as part of a team. Effective written and verbal communication skills. Willingness to work outdoors in varying field conditions. OSHA 10 Certification (able to obtain during internship). About AECOM: AECOM is proud to offer comprehensive benefits to meet the diverse needs of our employees. Depending on your employment status, AECOM benefits may include medical, dental, vision, life, AD&D, disability benefits, paid time off, leaves of absences, voluntary benefits, perks, flexible work options, well-being resources, employee assistance program, business travel insurance, service recognition awards, retirement savings plan, and employee stock purchase plan. The range for this position is $20 to $25. ReqID: J10147390."}, {"job_title": "Intern, Civil Engineering", "company_name": "Aecon U.S.", "city": "Charlotte", "state": "NC", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 25.0, "salary_max": 28.0, "salary_interval": "HOUR", "posted_date": "2026-03-18T00:00:00", "description_text": "Come Build Your Career at Aecon!\nAs a North American leader in infrastructure development, Aecon is safely and sustainably building what matters for future generations to thrive!\n\nWhat is the Opportunity?\nAt Aecon Engineering Services Inc. (United), we are a team of engineers, builders, planners, and thinkers that design and build today's infrastructure, for tomorrow. We come to work every day committed to drive growth and deliver projects that matter for our clients, ourselves, and our communities. Through our work in the nuclear, conventional generation, renewable and power delivery markets, we create resilient infrastructure to last generations.\n\nWe are currently looking for a Civil Engineering Intern to join our Aecon engineering team onsite in our Charlotte, NC and Mt. Laurel, NJ offices. The successful candidate will work with our experienced engineers in designing nuclear and conventional generation power plants.\n\nWhat You'll Do Here:\n- Assist with civil engineering assignments of limited to moderate complexity\n- Prepare civil / structural calculations, bill of materials (BOM), and basic engineering drawings using CAD software\n- Support plant data gathering and field walkdowns\n- Maintain detailed design document files\n\nWhat You Bring To The Team:\n- The successful candidate will have completed 3 years of a Bachelor of Science Degree in Civil Engineering from a 4-year ABET accredited college or university\n- Completed coursework in structural analysis, and/or construction engineering\n- Proficient with Microsoft Office (Outlook, Word, Excel, PowerPoint, etc.)\n- Experience with graphical design software such as Autodesk AutoCAD\n- Experience working with others in a project team environment\n- Strong technical writing, presentation, and communication skills\n- Ability to work independently as well as in a team environment\n- Ability to prioritize and organize work in a multi-tasked environment\n\nHourly Rate: $25.00–$28.00 per hour\n\nDue to the nature of work that United performs, candidates must be a US Citizen or Permanent Resident of the United States."}, {"job_title": "Civil Site Engineering Co-Op", "company_name": "American Structurepoint", "city": "Indianapolis", "state": "IN", "employment_type": "TEMPORARY", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "American Structurepoint - Civil Site Engineering Co-Op - Indianapolis, IN\n\nOverview\nJoin American Structurepoint and become part of a team that goes the extra mile for our clients and communities. We live by our values - respect, staff development, results and family. Our team is encouraged to explore new ideas and turn our clients' dreams into reality. With exceptional benefits, training, and mentorship, we pave the way for a rewarding career.\n\nAmerican Structurepoint's Civil Site Engineering group is seeking candidates to join us for a Co-op opportunity from August 10, 2026-December 18, 2026, in Indianapolis, IN!\n\nAs a Civil Site Engineering Co-op, you'll gain hands-on experience in site design, including grading, utilities, parking lots, roadways, and stormwater management. You'll collaborate with licensed engineers and contribute to the design and development of land development projects that impact local communities. This role offers extensive experience with AutoCAD, Civil 3D, and Microsoft Excel as you help create and refine construction plans.\n\nResponsibilities:\n- Work closely with Project Managers and Team Leaders on exciting land development projects, industrial, residential, mixed-use, urban re-development and/or affordable housing projects.\n- You will learn drafting, plan production, design, field inspections, cost estimation and coordination.\n- You will have the opportunity to use AutoCAD and HydroCAD.\n- Perform calculations, assist with permit applications, technical specification preparation and develop exhibits, design drawing and presentation materials.\n- Other duties as assigned.\n\nQualifications:\n- Student majoring in any of the following disciplines: Civil Engineering, Environmental Engineering, Construction Engineering, Land Survey or Structural Engineering or other related programs with an emphasis on Civil Engineering.\n- Reliable transportation to and from office location.\n- Strong work ethic, willingness to learn and try new things."}, {"job_title": "Construction Services / Water Resources Intern", "company_name": "Apex Companies", "city": "Westminster", "state": "CO", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 21.0, "salary_max": 22.0, "salary_interval": "HOUR", "posted_date": "2026-03-18T00:00:00", "description_text": "Are you highly motivated, hard-working, and seeking to join a growth-focused consulting & engineering firm? Apex Companies is one of the fastest growing engineering and environmental consulting firms in the US.\n\nYour Responsibilities:\n- Work in the field on active (and inactive) construction sites, and urban landscapes\n- Sediment and erosion control site maintenance and inspections\n- Post-construction restoration, remediation, etc.\n- Permanent water quality facility maintenance and inspections\n- Complete written field reports\n- Take direction from supervisor to perform various field duties\n- Ability to work with hand and power tools\n- Ability to lift and carry 60 pounds\n- Strong verbal communication. Customer service experience a plus\n- Observe safe work practices\n- Develop local, State, and Federal regulatory knowledge\n- Actively develop your own career growth\n\nWhat We're Looking For:\n- 0-2 years of experience (construction, landscaping/hardscaping, irrigation, etc. a plus)\n- Basic environmental science and regulatory knowledge\n- Strong verbal communication skills\n- Ability to multi-task\n- Awareness of safety standards and practices\n- Good record keeping\n- Valid driver's license and good driving record\n- Access to reliable transportation\n\nCompensation: $21 - $22 per hour\n\nReq ID: 11193"}, {"job_title": "Civil Engineering Intern", "company_name": "Ardurra", "city": "Marietta", "state": "GA", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Ardurra's 10-week summer Internship Program offers a dynamic blend of professional development and hands-on experience. Each intern is paired with a mentor for weekly guidance, coaching, and support. Participants attend weekly brown bag sessions covering topics like engineering disciplines, communication skills, and CAD design. Interns also complete a curated Ardurra Academy curriculum and collaborate on a final presentation for senior management, showcasing their summer experiences and learnings.\n\nWhy Intern With Ardurra:\n- Work on Real Projects: Contribute to real-world solutions that make a difference in communities\n- Learn from the Best: Receive mentorship and guidance from industry experts\n- Develop Skills: Strengthen your technical, problem-solving, and leadership abilities\n- Explore Career Paths: Discover your passions and potential career trajectories within the industry\n- Build Your Network: Build connections with peers, mentors, and professionals across our nationwide team\n\nBenefits:\n- Robust Benefits Offerings with Mental Health Coverage\n- 401(k) Retirement Accounts with Match\n- Flexible Work Options\n- Tuition Reimbursement\n- License and Certification Support"}, {"job_title": "Civil Engineering Internship", "company_name": "Benesch", "city": "Grand Island", "state": "NE", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Benesch - Civil Engineering Internship\n\nSimply Put, A Great Place to Work\nBenesch is a growing, multi-disciplined planning, engineering, and professional services firm. We enhance infrastructure and communities across the country – creating spaces and providing connections in ways that make a difference.\n\nWe pride ourselves on being nimble enough to remain responsive to client needs yet large enough to offer exceptional bench strength. As a member of our team, you'll have an opportunity to draw from those resources when you need them and, likewise, contribute your expertise when you have something to share.\n\nAt Benesch, we are looking for candidates with varied backgrounds and worldviews. We are committed to offering an inclusive work environment where everyone feels valued and respected. Statistics show that women and underrepresented groups are less likely to apply for a position if they don't meet 100% of the qualifications. If this statement resonates with you, don't be so hard on yourself—apply for the job!\n\nLocation: This position may be based at any of our Nebraska office locations, including Omaha, Lincoln, Bellevue, or Grand Island, NE.\n\nWhat We Are Looking For:\n- Completed or working towards a bachelor's or master's degree in a relevant industry field such as:\n  - Civil, Construction, Structural, Transportation, or Engineering\n  - Landscape Architecture, Transportation Planning, Urban Planning, or other related degrees\n- Proficiency in industry-relevant software is preferred but not required. We'll train you!\n- Strong verbal and written communication skills, coupled with analytical and problem-solving abilities.\n- Ability to manage assignments efficiently and maintain organizational skills.\n\nBenefits:\n- Insurance, retirement plans, and wellness programs.\n- Tuition reimbursement for job-related courses.\n- Ongoing professional development through resources like Red Vector, LinkedIn Learning, technical team meetings, knowledge-sharing training sessions.\n- Retirement: Access to valuable retirement planning tools, education, and individual meetings with plan advisors at no charge.\n- Potential for Benesch to contribute up to 9% of your gross compensation to your retirement plan (5% profit-sharing contribution to your 401(k) plan, regardless of your own contributions & 80% match on your contributions, up to a maximum company contribution of 4%).\n- Work/Life Balance: Flexible work schedules and hours, including work-from-home options (dependent on the role). Generous Paid Time Benefits (PTB) that increase with your career. Ten days of paid parental leave for birth, adoption, or foster placement."}, {"job_title": "Civil Engineering Intern", "company_name": "Bowman Consulting", "city": "Alpharetta", "state": "GA", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Bowman has an opportunity for a Civil Engineering Intern to join our team in Alpharetta, GA.\n\nPurpose: Introduction to designing and developing traffic studies, water, storm and sanitary sewer studies, and construction plans, civil engineering site plans, and roadway plans for construction.\n\nResponsibilities:\n• Perform work under direct supervision of an experienced professional\n• Assist with site grading, erosion and sediment control design\n• CAD design and drafting\n• Storm water management design\n• Water treatment\n• Traffic analysis and utility design\n• Field inspections\n• Construction administration responsibilities\n\nQualifications:\n• High School Diploma, GED, or equivalent\n• Enrolled in college degree program in civil engineering or related discipline\n• Focus on civil engineering strongly preferred\n• Proficient in Microsoft Office Suite\n• Must hold valid state driver's license\n\nBenefits:\n• Medical, dental, vision, life, and disability insurance\n• 401(k) retirement savings plan with company match\n• Paid time off, sick leave, and paid holidays\n• Tuition reimbursement"}, {"job_title": "Civil/Environmental Engineering Intern", "company_name": "Carollo Engineers", "city": "Boise", "state": "ID", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Overview: Carollo Engineers is a leading engineering firm dedicated exclusively to water. For over 90 years, we've specialized in the planning, design, and construction of water, wastewater, stormwater, and reuse facilities, bringing innovative and sustainable solutions to the water sector's most complex challenges. We work with water agencies, municipalities, utilities, research organizations, and private companies across various industries, including technology, manufacturing, and beyond. These clients choose Carollo because we employ some of the most knowledgeable and experienced professionals in the world. When you join our team, you'll work alongside industry leaders who are advancing the science of water, protecting public health, and building resilient communities. Carollo's vision is to be the best water consulting firm and the best place for you to build your career. Responsibilities: Perform engineering work in various engineering fields (water and wastewater treatment, and engineering services during construction). Work on engineering designs. Assist preparing reports. Develop plans and specifications, and cost estimates for various projects. Check submittals for performance or conformity with plans and specifications. Assist with the preparation of technical memoranda, reports and electronic deliverables. Data entry and analysis. Participate in field activities such as site investigations, and pilot testing. Qualifications: High School Diploma or equivalent. Finishing or completed junior year of college. Currently pursuing a Bachelor's or Master's Degree in Civil or Environmental Engineering field. Strong verbal and written communication skills. Proficient in Microsoft Word and Excel. Preferred: Experience and/or coursework in water/wastewater treatment and conveyance. Previous related internship experience a plus. Passed or scheduled for the FE/EIT exam. Experience using CAD software."}, {"job_title": "Civil/Site Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "Exton", "state": "PA", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Overview \n \n** Colliers Engineering & Design is looking for a Civil/Site Engineering Intern to join our team in the Exton, PA office for Summer 2026! \n \nOur team of Civil/Site professionals regard you as a strategic partner. Whether facilitating a large retail complex, residential development or planning a small stand-alone establishment in a downtown business district, we embrace your vision while guiding you through the development process. Our expertise in implementing proven strategies and experience with the regulatory process eliminates costly delays that ensure your vision unfolds seamlessly. Our partnership includes the advantage of having our comprehensive suite of in-house services at your disposal, which keeps your design time-line on track. \n \n **Responsibilities \n \n**\n * Our interns will assist technical staff on day-to-day projects in their respective disciplines.\n * Preparing site plans under direction of junior engineers.\n * Code reviews.\n * Code requirements from municipalities.\n * SWPPP inspections (will be trained on this by team).\n * Erosion inspections on-site.\n * CED internships are unique in that they are work-centered, meaning you are working on real, billable client work right away.\n * This is a great way to gain real life experience in consulting.\n * In addition to the work-centered program, we also offer robust internship programming, which includes opportunities to work with other interns, learn about other areas of the business, and develop valuable communication skills and networking connections. \n \n\n **Qualifications \n \n**\n * Actively pursuing a Master's or Bachelor's degree in Civil Engineering, Environmental Engineering, or a related field.\n * Hydrology type work or coursework and Hydraulics coursework.\n * All applicants should be eligible to work in the US and attend a university or college physically located in the United States.\n * Be highly motivated, able to work in a fast paced environment, and have great communication skills.\n * AutoCAD experience preferred.\n * Civil 3D experience preferred.\n * HydroCAD experience a plus.\n * Site/Civil interest specifically Land Development.\n * Students with some prior internship experience are preferred, but any candidates who apply will be reviewed and considered for different roles.\n * Ability to read, write, and understand English for purposes of comprehending written job-related communications and verbal instructions and interactions. \n \n\n **What We Offer \n \n** At Colliers Engineering & Design, our people are our most important resource. That’s why we are committed to providing all our employees with a safe, comfortable work environment, potential for career advancement, and the ability to impact society through their projects as well as Company sponsored activities. \n \nOur interns are given opportunities to learn in a variety of settings. Multidisciplinary engineering, surveying, and architectural design projects provide interns an opportunity to see the work in real-life settings, working side by side with other professionals in their chosen field. They are also able to participate in educational opportunities that build a variety of transferable skills valuable in every career. Our Career Exploration Series provides interns with chances to network and learn from the professionals doing the work and growing our business. Interns also complete a series of reflections, problem solving activities, contests, drawings, and create end of summer presentations which help showcase their learning and experiences. Additional networking and trainings specific to the students' areas of study are also made available to students throughout the Summer Internship program. \n \nOur internship program is designed to help grow our organization organically with talented individuals starting their careers all over the country. On average, we make full-time, permanent offers to students approaching graduation within a year more than 50% of the time. We want great talent to start their careers here stay with CED and its affiliates for their entire career! \n \nWe have created an internal culture that provides the resources and technology needed to encourage personal and professional growth opportunities through reimbursement for education; a free in-house resource for hundreds of educational and self-enrichment courses; mentorship program; wellness program; Women’s Organization and ongoing philanthropic opportunities. We make as many of these opportunities available to our interns, as well as our regular employees as possible. \n \nApply today to learn how you can join our team of professionals, so we can help you **_Accelerate Your Success_**! \nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nInternship \n * ### Job function \nEngineering and Information Technology \n * ### Industries \nProfessional Services \n\nReferrals increase your chances of interviewing at Colliers Engineering & Design by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D71630305&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Site Engineer jobs in **Exton, PA**. \n[ Sign in to create job alert ](https://www.linkedin.com/login?emailAddress=&fromSignIn=&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2Fcivil-site-engineering-intern-at-colliers-engineering-design-4345854753%3Fposition%3D3%26pageNum%3D0%26refId%3DL15VxMG8eQHcS6onQldMFA%253D%253D%26trackingId%3DMvPaiAOMGVU4QkMb%252BBLv0w%253D%253D&trk=public_jobs_job-alert-guest-redirect-cta)\n`` `` ``\n##"}, {"job_title": "Civil/Site Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "Phoenix", "state": "AZ", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Colliers Engineering & Design - Civil/Site Engineering Intern\n\nOverview\nWe are seeking highly-motivated Civil/Site students in the Phoenix, AZ area to join our Talent Community for future project opportunities. While this is not an active opening, we encourage qualified candidates to apply so we can consider you as new roles become available.\n\nAs part of our Talent Community, your application will be reviewed for upcoming projects that require intern/co-op support for private and public projects in civil/site development.\n\nColliers Engineering & Design, an affiliate of Colliers, is a trusted provider of multi-discipline engineering, design and consulting services to public and private sector clients. Headquartered in Holmdel, New Jersey with over 80 offices throughout the United States, we specialize in providing a comprehensive suite of services including: civil/site, transportation, MEP (mechanical, electrical & plumbing) engineering, architecture, geospatial/survey, infrastructure, governmental, geotechnical/environmental, telecommunications and utilities engineering. We employ over 3,000 talented professionals who utilize the most advanced technologies to deliver customized solutions for our clients.\n\nResponsibilities\nOur interns will assist technical staff on day-to-day projects.\n- Read and review project drawings and plans.\n- Confer with engineers about preparing plans.\n- Use AutoCAD and Civil 3D software under the charge of Engineers.\n- Observe project sites and evaluate contractors' work to detect problems with a design.\n- Prepare reports and document project activities and data.\n- Prepare analyses from collected data.\n- Set up and help maintain project files and records.\n\nIn addition to the work-centered program, we also offer robust internship programming, which includes opportunities to work with other interns, learn about other areas of the business, and develop valuable communication skills and networking connections.\n\nQualifications\n- Pursuing a Bachelor's or Master's degree in Civil Engineering with an interest in Civil/Site Development, or a related program.\n- Must have reliable transportation to the office.\n- Basic understanding of AutoCAD and/or Civil 3D preferred.\n- Excellent written and verbal communication skills.\n- Possess solid problem-solving skills.\n- Must be able to work in a high-paced environment.\n- Strong computer literacy, to include MS Office.\n- Ability to read, write and understand English for purposes of comprehending written job-related communications and verbal instructions and interactions.\n\nWhat We Offer\nAt Colliers Engineering & Design, our people are our most important resource. That's why we are committed to providing all our employees with a safe, comfortable work environment, potential for career advancement, and the ability to impact society through their projects as well as Company sponsored activities.\n\nOur interns are given opportunities to learn in a variety of settings. Multidisciplinary engineering, surveying, and architectural design projects provide interns an opportunity to see the work in real-life settings, working side by side with other professionals in their chosen field. They are also able to participate in educational opportunities that build a variety of transferrable skills valuable in every career. Our Career Exploration Series provides interns with chances to network and learn from the professionals doing the work and growing our business. Interns also complete a series of reflections, problem solving activities, contests, drawings, and create end of summer presentations which help showcase their learning and experiences. Additional networking and trainings specific to the students' areas of study are also made available to students throughout the Summer Internship program.\n\nOur internship program is designed to help grow our organization organically with talented individuals starting their careers all over the country. On average, we make full-time, permanent offers to students approaching graduation within a year more than 50% of the time."}, {"job_title": "Civil/Site Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "San Antonio", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "We are seeking highly-motivated Civil/Site students in the San Antonio, TX area to join our residential and commercial teams in our Civil/Site Discipline.\n\nResponsibilities: Assist technical staff on day-to-day projects. Read and review project drawings and plans. Confer with engineers about preparing plans. Use AutoCAD and Civil 3D software under the charge of Engineers. Observe project sites and evaluate contractors' work to detect problems with a design. Prepare reports and document project activities and data. Prepare analyses from collected data. Set up and help maintain project files and records.\n\nQualifications: Pursuing a Bachelor's or Master's degree in Civil Engineering with interest in Civil/Site Development, or a related program. Must have reliable transportation to the office. Basic understanding of AutoCAD and/or Civil 3D preferred. Excellent written and verbal communication skills. Solid problem-solving skills. Must be able to work in a high-paced environment. Strong computer literacy including MS Office.\n\nWhat We Offer: Our internship program offers robust programming including opportunities to work with other interns, learn about other areas of the business, develop communication skills and networking connections. Our Career Exploration Series provides networking and learning from professionals. Interns complete reflections, problem solving activities, contests, drawings, and end of summer presentations. On average, we make full-time, permanent offers to students approaching graduation within a year more than 50% of the time.\n\nBenefits include: resources and technology for personal and professional growth, reimbursement for education, free in-house educational courses, mentorship program, wellness program, Women's Organization, and philanthropic opportunities."}, {"job_title": "Traffic Planning - Civil Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "Austin", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Overview: We are seeking a highly-motivated intern to join our Traffic Planning Discipline for Summer 2026 in our Austin, TX office. Colliers Engineering & Design, an affiliate of Colliers, is a trusted provider of multi-discipline engineering, design and consulting services to public and private sector clients. Headquartered in Holmdel, New Jersey with 80+ offices throughout the United States, we specialize in providing a comprehensive suite of services including Civil/Site, Transportation, Buildings, Geospatial/Survey, Infrastructure, Governmental, Geotechnical/Environmental, Telecommunications and Utilities Engineering, Project Management, & Architecture. We employ over 3,000 talented professionals who utilize the most advanced technologies to deliver customized solutions for our clients. Responsibilities: Assist technical staff with day-to-day design tasks for various types of transportation and traffic projects. Traffic analysis responsibilities including data collection, crash analysis, and intersection & roadway capacity analysis utilizing various software, under the supervision of junior and senior level engineers. Traffic reporting duties including preparation of traffic impact studies as assigned by your management team. CAD work for conceptual design plans from a traffic planning & preliminary design. Construct cost estimating responsibilities for detailed design plans. Opportunity to advance to higher level responsibility depending upon performance throughout the summer. Collaboration with other interns to understand various disciplines and aspects of Colliers Engineering & Design. Participation in planning and technical report documentation. Qualifications: Pursuing a Bachelor's or Master's degree in Civil Engineering or a related program at an ABET-accredited University. Previous coursework in Traffic Planning, Traffic Design or Transportation preferred. Prior internship experience preferred but not required. Interest in working on Traffic and Transportation related projects. Must have reliable transportation to the office. Basic understanding of AutoCAD and/or MicroStation preferred. Excellent written and verbal communication skills. Possess solid problem-solving skills. Must be able to work in a high-paced environment. Strong computer literacy including MS Office."}, {"job_title": "Civil Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "Bryan", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "We are seeking highly-motivated students to join our Municipal Discipline in our Houston, TX office during Summer 2026.\n\nResponsibilities:\n• Assist technical staff on day-to-day projects\n• Read and review project drawings and plans\n• Use AutoCAD and Civil 3D software under the charge of Engineers\n• Observe project sites and evaluate contractors' work\n• Prepare reports and document project activities\n• Set up and help maintain project files and records\n\nQualifications:\n• Pursuing Bachelor's or Master's in Civil Engineering\n• Basic AutoCAD/Civil 3D preferred\n• MS Office proficiency\n• Strong problem-solving skills\n• Excellent written and verbal communication skills\n\nSource: https://careers.colliersengineering.com/benefits/jobs/12793"}, {"job_title": "Civil Engineering Intern - Land Development", "company_name": "LJA", "city": "Fort Worth", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "LJA - Civil Engineering Intern - Land Development\n\nWhat LJA Has To Offer\nLJA is offering an exciting opportunity that will allow you to reach your full career potential. The structure of our organization is designed to amplify your capabilities while gaining the benefits of being an employee-owner.\n\nAt LJA, our employee-owners take pride in their work and their workplace. We're guided by leaders who foster a culture of respect, collaboration and a shared vision of success.\n\nPOSITION OVERVIEW: As a Civil Engineering Intern at LJA Land Development, you will be able to explore our exciting and entrepreneurial culture and allow you to think creatively, solve problems, and meet the needs of our clients daily.\n\nA TYPICAL DAY MIGHT INCLUDE:\n- Perform engineering assignments with direction from experienced engineers\n- Spend time shadowing actual operations and learn about project phases\n- Will have unique assignments that support larger projects as well as experience the day-to-day workings of engineering\n- Experience our culture and participate in social engagement activities and learn about our sectors and services\n\nREQUIRED EDUCA tern at LJA Rail, you will be able to explore our exciting and entrepreneurial culture and allow you to think creatively, solve problems, and meet the needs of our clients daily.\n\nA TYPICAL DAY MIGHT INCLUDE:\n- Perform engineering assignments with direction from experienced engineers\n- Spend time shadowing actual operations and learn about project phases\n- Will have unique assignments that support larger projects as well as experience the day-to-day workings of engineering\n- Experience our culture and participate in social engagement activities and learn about our sectors and services\n\nREQUIRED EDUCATION/LICENSE/CERTIFICATIONS:\n- Candidates must have completed at least one year of college and pursuing a Bachelor of Science, Civil or Environmental Engineering is required.\n\nIDEALLY, YOU SHOULD ALSO HAVE:\n- Great work-ethic and are a highly motivated student with a strong academic performance\n- Have sincere desire to gain experience in and knowledge of the company and industry\n- Good organizational and communication (oral and written) skills\n- Focused and attention to detail with ability to identify discrepancies\n- Collaborate and work well in a team environment\n- Proficient in Microsoft Office, especially MS Excel\n\nLEVEL UP WITH LJA:\n- 100% employee-owned. This drives results, rewards ambition and supports long-term success for every team member.\n- Flexible Work Options: Schedules to help you balance life and work.\n- Generous Time Off: PTO, paid holidays, and a full office closure between Christmas and New Year's.\n- Comprehensive Benefits: Multiple plan options for health, dental, and pets. Along with mental health support.\n- Family Support: Paid maternity and parental leave.\n- Education Support: Tuition reimbursement and in-house courses.\n- Referral Bonuses: Know great talent? Get rewarded.\n- Community Impact: Company-sponsored volunteer days and philanthropic initiatives.\n- Professional Development: Memberships to industry organizations.\ tle": "Intern - Civil/Structural Engineering", "company_name": "ORION", "city": "Houston", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "ORION - Intern - Civil/Structural Engineering\n\nJob Description\nThis position participates in the engineering design, analysis, and professional development program at Orion Engineering. College-level individuals in this program are exposed to and gain hands-on experience supporting engineering teams involved in the planning, design, analysis, and execution of marine and heavy civil infrastructure projects.\n\nAreas of exposure may include structural and geotechnical engineering support, data collection and analysis, preparation of drawings and calculations, design reviews, field observations, and coordination with project management and construction teams. This internship is intended to provide practical engineering experience while supporting the intern's academic development and long-term career growth within the engineering profession.\n\nThe incumbent must support the guiding beliefs and core values of Orion, which are centered on Safety, Quality, Delivery, and Teamwork, most importantly, with each built upon the all-important foundation of Integrity.\n\nSpecific Responsibilities:\nEngineering Assignment:\n- Works under the supervision of licensed Professional Engineers and senior engineering staff to support ongoing engineering and design projects.\n- Assists with collecting data, reviewing drawings, specifications, and design criteria.\n- Performs basic engineering calculations and analysis using prescribed techniques and established engineering standards.\n- Assists in the preparation of drawings, sketches, exhibits, and other engineering deliverables.\n- Supports engineers in evaluating existing waterfront and marine structures and developing repair or upgrade concepts.\n- Observes construction activities to better understand constructability, sequencing, and best design applications.\n- May assist with basic survey activities, field measurements, and site observations as required.\n- Learns how engineering disciplines interface with project management, construction operations, and field personnel.\n\nOffice and Field Exposure:\n- Works primarily in the engineering office environment with limited field exposure as assigned.\n- Interfaces with Engineers, Project Managers, Designers, and other project team members.\n- Learns how engineering deliverables support successful project execution and closeout.\n- Assists with document control, technical documentation, and organization of project files.\n- Learns professional communication, teamwork, and engineering best practices in a consulting and construction-support environment.\n\nEmployee Safety and Compliance:\n- Responsible and accountable for incumbent's own personal safety.\n- Responsible and accountable for the safety of all co-workers and any others incumbent comes in contact with.\n- Authorized and obligated to stop work on any task or series of tasks whenever an unsafe condition or situation is anticipated or is observed.\n- Reports any and all violations of applicable laws, regulations, or Company policies and procedures promptly.\n\nPosition Requirements:\n- Individuals in this position must be currently enrolled in and have completed at least one (1) year of coursework in a Civil Engineering program (structural or geotechnical emphasis preferred) or a closely related engineering discipline that leads to a B.S. degree at an accredited college or university.\n- Completed or ongoing coursework in Structural Analysis, Geotechnical Engineering, Engineering Mechanics, Construction Materials, Engineering Graphics, Surveying, and/or Project Management is desired.\n- Prior internship or work experience related to engineering, construction, or marine infrastructure is preferred but not ect and prepare data for evaluation. Perform engineering with the use of computer-assisted engineering software and equipment. Provide support to engineering and project management associates. Qualifications: Current student pursuing a Bachelor's or Master's degree in Civil Engineering at an accredited ABET university. Excellent written and verbal communication skills. Ability to work on multiple assignments simultaneously. Preferred: 3.0 GPA or above. Prior internship or related experience. AutoCAD and/or Microstation experience. Experience or exposure to FDOT plans preparation and design standards. Specific interest in Transportation / Roadway Design. The Team: From managed toll lanes and long-range corridor plans to complex interchanges, major roadway, and segmental bridge designs, our teams provide the highest quality planning, environmental and engineering design solutions to our clients. Each day, we partner with transportation agencies and local governments across the country to keep our communities moving and improving the overall quality of life. By joining our team, you too can lead the evolution of transportation. The Company: RS&H provides fully integrated architecture, engineering, and consulting services to help clients realize their most complex facility and infrastructure projects for land, air, and space. We are committed to bringing extraordinary solutions to our clients through the promise of imagination, ingenuity, and innovation. With a tradition of excellence that began in 1941, we are consistently ranked among the nation's top 100 design firms."}, {"job_title": "Internship, Civil Engineering Fall 2026", "company_name": "Simpson Gumpertz & Heger (SGH)", "city": "Waltham", "state": "MA", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-18T00:00:00", "description_text": "Simpson Gumpertz & Heger (SGH) is seeking current students for a 2026 Fall Civil Engineering Internship and/or Co-op in our Waltham office.\n\nAs a Civil Engineering Intern or Co-op, you will work side-by-side with industry-leading experts in the office and in the field to gain hands-on experience while applying classroom knowledge to real-world challenges.\n\nWhat You'll Be Doing:\n- Land development projects in the public and private setting across several markets\n- Adaptive re-use renovations\n- Sustainable development concepts, including urban recharge\n- Flood-exposure evaluation and mitigation\n- Detailed due diligence and risk assessment\n- Utilities and drainage investigation and design\n- Detailed hydrologic and hydraulic analysis\n- Plaza reconstruction\n- Accessibility evaluation and repairs\n- Pavement evaluation, investigation, and design\n- Pump system investigation and design\n- Detailed data analytics and drafting with Civil3D and other software\n- Preparation of construction documents, specifications, written reports, and presentations\n- Collaborate with SGH's Geotechnical, Marine, Structural, and Building Technology groups on slope and shoreline stabilization, retaining wall systems, footing drainage systems, sub-slab dewatering systems, floodproofing, plaza drainage systems, and many other exciting projects\n- Organize field data and assist with research to facilitate analysis, problem solving, and repair design\n- Perform analysis under the guidance of licensed professionals using a combination of hand calculations and analysis software\n\nWhat You'll Need:\n- Currently enrolled and plan to complete a bachelor's degree in civil engineering\n- Interest in civil engineering\n- High grades in their studies\n- Interest in learning through hands-on work experience in a consulting engineering environment"}, {"job_title": "Intern (Civil Engineering)", "company_name": "Terracon", "city": "Theodore", "state": "AL", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": n pportunity for a local student who would like to intern part-time while in school. Local candidates preferred, no housing stipend will be provided. Dewberry is a leading, market-facing professional services firm with more than 60 locations and 2,500+ professionals nationwide. What sets us apart from our competitors are our people. Required Skills & Required Experience: Candidate is required to be pursuing a BS in Civil Engineering. Solid oral and written communication skills. Interest in using CADD (Microstation or AutoCAD). A desire to work in a team environment. At this time, Dewberry will not sponsor a new applicant for work authorization. Dewberry is an Equal Opportunity Employer. Summer Intern Program: During the summer intern program, interns gain hands-on project experience, develop technical skills, and put their classroom knowledge into action. Our interns are assigned meaningful work and are given the opportunity to work on projects similar to what they would be engaging with as a full-time employee. Our interns get the opportunity to participate in a series of workshops and events, including: Networking opportunities to meet other interns, staff, and senior leaders across the business. Learning about our services, projects, and clients. Professional development workshops, including a career planning workshop and a DiSC assessment to learn more about themselves and how to work effectively with others. Summer-long group project where interns work alongside firm leaders to address issues that will impact our future strategy."}, {"job_title": "Civil Engineering Intern (Summer 2026)", "company_name": "HDR", "city": "Roanoke", "state": "VA", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-11T00:00:00", "description_text": "HDR - Civil Engineering Intern (Summer 2026)\n\nAt HDR, our employee-owners are fully engaged in creating a welcoming environment where each of oup has an executive sponsor and is open to all employees.\n\nPrimary Location: United States-Virginia-Roanoke\nIndustry: Highway + Road\nSchedule: Full-time\nEmployment Status: Temporary\nBusiness Class: Highways"}, {"job_title": "Civil-Site Engineering Intern", "company_name": "Hargrove Engineers & Constructors", "city": "Mobile Metropolitan Area", "state": "", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-11T00:00:00", "description_text": "Hargrove Engineers & Constructors - Civil-Site Engineering Intern\n\nWhat You'll Be Doing\nJob Summary: Generally responsible for assisting in performing routine designs of less complex engineering assignments using theoretical knowledge and practical design methods. This work will be performed under direct supervision.\n\nPrimary Responsibilities Will Include But Not Be Limited To:\n- Familiarity with and utilizing department design and drafting standards.\n- Assisting in developing conceptual layout and cost studies as necessary to determine the simplest, most efficient approach to solving engineering tasks.\n- Assisting in producing estimate level preliminary designs and material take-offs.\n- Assisting in producing detail design calculations and sketches for materials of construction associated with projects.\n- Assisting in producing designs with efficient use of construction materials with an overall emphasis on ease of construction and completed product meeting the expectations of the client.\n- Assisting the drafting group in resolving routine layout and detailing problems.\n- Assisting with filing, print scanning, copying and other departmental support tasks.\n\nThis position offers a highly competitive compensation package, including paid time off, health insurance benefits, and matching retirement contributions.\n\nIdeal Background:\nEducation: Current enrollment in a Bachelor or Master of Science Degree Program in Civil Engineering at an accredited university is required. Structural coursework is required for structural engineering internships or co-ops.\nGPA: 2.7 or above Required\n\nKnowledge, Skills, And Abilities:\n- Basic knowledge of CAD software, either AutoCAD, Microstation or both.\n- Proficient in the use of Microsoft Word, Excel and Outlook.\n- Good communication skills, both verbal and written.\n- Begin developing virtual team skills and familiarity with interoffice execution.\n\nPhysical Requirements:\nAbility to sit, stand, or walk for long periods of time.\n\nHargrove Culture:\nWe work to create an environment founded on trust, personal integrity, and a \"team mentality\" so that each person understands the value of their contributions both on a project and company-wide level. We know that each person on our team contributes to the success of our company by pairing expertise and passion to meet and exceed the needs of the clients we serve across the globe.\n\nOur safety culture protects and promotes the well-being of every person who works with us and every person touched by our work.\n\nAs a 100% Teammate owned company, we proudly offer a comprehensive benefits package including, paid holidays, personal paid time off, medical, dental, vision, life, and disability insurance, 401(k), and other benefits to eligible Teammates.\n\nEqual Opportunity Employment Statement:\nHargrove is an Equal Opportunity/Affirmative Action employer. We do not discriminate based upon race, color, national origin, religion, age, sex (including gender, sexual orientation, pregnancy, sexual identity, marital or family status), disability, military service or obligations, veteran status, or any other characteristic protected by law.\n\nThe selected candidate must be authorized to work in the United States."}, {"job_title": "Civil Engineering Intern / Co-op - Summer 2026", "company_name": "Langan Engineering & Environmental Services", "city": "Nashville", "state": "TN", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-11T00:00:00", "description_text": "Langan Engineering & Environmental Services - Civil Engineering Intern / Co-op - Summer 2026\n\nJob Summary\nLangan is seeking a Civil Engineering Intern or Co-op to join its collaborative team in Nashville, TN. This individual will serve a key function in supporting site feasibility studies which may involve field work, technical report preparation and calculations, pre-construction conditions documentation, design plans and specifications. In this role, you will have the opportunity to expand your knowledge and experience technically and professionally by partnering directly with industry leadership on a variety of exciting land development projects.\n\nJob Responsibilities:\n- Assist with the planning, design and permitting of civil engineering, land development and infrastructure projects;\n- Assist with the preparation and modification of various engineering documents including reports, specifications, plans, construction schedules, cost estimates and design plans for projects using engineering and design software (AutoCAD, Civil 3D, etc.) and equipment;\n- Effectively use reports, maps, drawings, engineering plans, tests, and aerial photographs to assess soil composition, terrain, hydrological characteristics, and topographical and geologic data and their impact on the planning and design of projects;\n- Support zoning, ordinance and permit assessments, assists with the sidewalk cast estimations, and determines the feasibility of projects based on the analysis of collected data;\n- Provide field inspection services, as needed;\n- Apply knowledge and techniques of engineering and advanced mathematics;\n- Collaborate with team members on project tasks and assignments;\n- Perform other duties as requested.\n\nQualifications:\n- Student actively pursuing a four year or advanced degree in Civil Engineering;\n- Cumulative GPA of 3.0 or greater is preferred;\n- Working knowledge of AutoCAD or Civil 3D, and Microsoft Office Suite applications;\n- Excellent written and verbal communication skills;\n- Strong attention to detail with excellent analytical, multitasking, and judgment capabilities;\n- Ability to effectively work independently and in a team environment;\n- Possess reliable transportation for client meetings and job site visits and a valid driver's license in good standing.\n\nLangan provides expert land development engineering and environmental consulting services for major developers, renewable energy producers, energy companies, corporations, healthcare systems, colleges/universities, and large infrastructure programs throughout the U.S. and around the world. Consistently ranked among the top ten \"Best Firms to Work For\" and Engineering News-Record's top 50 firms worldwide.\n\nBenefits include: full-time employment company paid medical, dental, and vision coverage; life insurance, short- and long-term disability insurance, and paid pregnancy disability leave; 401(k)/Roth with company match; paid time off including parental and military leave; employee referral and professional license bonuses; and educational reimbursement."}, {"job_title": "Civil Engineering Intern (Hiring for May 2026) - Ohio", "company_name": "OHM Advisors", "city": "Perrysburg", "state": "OH", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-11T00:00:00", "description_text": "OHM Advisors - Civil Engineering Intern (Hiring for May 2026) - Ohio\n\nCome work for OHM Advisors, the Community Advancement firm.\n\nWith the singular mission of Advancing Communities, our diverse 750+ team of professionals works collaboratively across multiple service areas in multiple states, including architecture, engineering, planning, surveying, and construction engineering.\n\nWe are a team of experts with in e preferred. Experience with AutoCAD or MicroStation is a plus.\n\nInternship Experience:\nAt OHM Advisors, interns are valued contributors to our mission of advancing communities. Throughout your internship, you'll be part of a supportive and people-first culture where learning and collaboration are prioritized. From day one, you'll work alongside professionals who are passionate about mentoring and helping you grow— both technically and professionally.\n\nOur internship program offers opportunities to explore different disciplines, build lasting connections, and develop the confidence and skills to take the next step in your career.\n\nOHM Advisors is an Equal Opportunity Employer (EOE). All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, disability, or protected veteran status. Perrysburg, OH office."}, {"job_title": "Student Engineering Intern - Civil", "company_name": "RESPEC", "city": "Fort Myers", "state": "FL", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-11T00:00:00", "description_text": "Company Description: Big challenges need bold thinkers. If you're someone who sees problems as opportunities, you'll thrive here. RESPEC is 100% employee-owned, which means we take ownership of every challenge. Since 1969, we've tackled complex challenges in energy transition, infrastructure resilience, digital transformation, and sustainability. At RESPEC, you'll work alongside clients to tackle critical problems. Job Description: RESPEC seeks a motivated intern for our Fort Myers, FL, location. This role involves all aspects of residential and commercial land-development design. The internship will be offered during the Summer semester from May 2026 - August 2026, with potential of moving in to a full-time position. Responsibilities include but are not limit
