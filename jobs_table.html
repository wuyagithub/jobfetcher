s. \n * Basic proficiency with technical writing, office automation, software, spreadsheets, technology, and tools. \n * Proven track record of upholding workplace safety and ability to abide by WSP’s health, safety and drug/alcohol and harassment policies. \n * Authorization to work in the United States at the start of the internship. \n \n \n\n**Preferred Qualifications \n \n**\n * Actively enrolled in an accredited Civil Engineering, Structural Engineering, or related, Masters or PhD program with an anticipated graduation date of August 2026 or later. \n * Ideal coursework includes structural analysis, concrete, steel, soils, foundations, and surveying.\n * Prior internship and leadership involvement on campus. \n * Students who have passed or are scheduled to take the FE/EIT exam will be strongly considered for this position\n * Familiarity with design, drafting, or engineering software such as MATHCAD, SOLIDWORKS, AUTOCAD, etc., as well as Microsoft Excel, is beneficial \n \n \n\nPOWER Engineers, Member of WSP, is a global consulting environmental and engineering firm and one of the top design firms in the energy sector. Together, POWER and WSP’s 73,900 experts create positive, long-lasting impacts for our communities and our clients in the power and energy, transportation and infrastructure, environmental, and property and buildings sectors. As part of our team, you’ll discover a world of opportunities to connect with innovative thinkers, forge your path, and have fun tackling the world’s most challenging projects. \n \nAt POWER Engineers, Member of WSP, you can have a rewarding career on every level. Our philosophy is simple: Do Good. Have Fun. Build Success. \n \nWe are a fun engineering firm. That might seem contradictory to some, but it works for us! \n \nPOWER is an Equal Opportunity Employer, including women, minorities, veterans and individuals with disabilities. \n \nCompensation: \n \nExpected Pay (all locations): $19.13 - $30.00 Per hour \n \nWSP USA es and the environment \n * Courage: Take initiative and make a difference | Think boldly and act with conviction | Take personal ownership\n * Resilience: Be determined and persevere | Be purposeful and steadfast in our principles \n \n\n**What You Will Do \n** ExxonMobil employs over 18,000+ engineers and scientists globally, 35% of which are across the U.S. As an engineering intern or co-op student working at ExxonMobil, you’ll be a part of world class teams, gain hands-on experience, and skills working on projects that create impact. Typical projects could include experiences in Mechanical Integrity, Process Engineering, Process Control, Process Development, Product Development, Project Development, Project Management, Quality Control, Modeling and Optimization, Test Method Development, Wells Engineering, Wells Operations, Safety, Environmental, Reservoir, and Supply Chain. \n \nIn addition to project work in your assigned area, you’ll have opportunities to tour our facilities, learn from senior leaders, and engage with a wide range of experienced professionals and other students. We also host a variety of social events both on and off site to allow our interns and co-ops to engage further with their cohort, recent graduates, other professionals, and senior leaders across the organization. \n \nDuration of our summer internships are typically 3 months, spanning across the summer, with co-op opportunities covering roughly 4 - 5 months in either the spring or fall. Successful interns may receive the opportunity to return for another intern or co-op assignment, or full-time employment. \n \nLearn more about ExxonMobil Career Paths **here \n \n** **Work Location \n \n** Depending on the location, our engineering interns and co-op students support our chemical, refining, pipeline and upstream operations, with opportunities also available within research & technology and supply chain. \n \nAssignments may include, but are not limited to, the following locations: \n \n oth technical and professional skill development while providing networking opportunities that can enhance future career prospects. Additionally, AECOM’s dedication to innovation and sustainability enables interns to contribute to meaningful projects that help shape communities and the built environment. \n \n_This position is expected to begin in May/June 2026. \n_ \n**The responsibilities of this position include, but are not limited to: \n**\n * Perform assignments requiring the application of standard techniques, procedures, and criteria to carry out engineering tasks. Assignments are designed to further develop judgment and understanding of professional and ethical responsibilities.\n * Exercise judgment limited to developing details of work in making preliminary selections and adaptations of engineering alternatives.\n * Stormwater modeling, analysis, and design.\n * Prepare design drawings, plans, sections, details, and profiles/sections within the Autodesk Civil 3D and/or AutoCAD MEP.\n * Assist in the development and application of hydrologic and hydraulic modeling and analyses related to floodplain management studies and a variety of water resource projects.\n * Prepare engineering-related calculations and develop drawings and visual aids.\n * Work under the supervision of a project manager or senior-level team member.\n \n\n**Qualifications \n** \n**Minimum Requirements: \n**\n * Candidates must be pursuing a Bachelor’s degree in Civil, Water, Environmental Engineering or related field, and must have completed at least 2 of years of study. Candidates who have recently graduated with a Bachelor’s degree and plan to continue with the Master’s degree are eligible to apply for these positions. Recent graduates must have been enrolled in their bachelor’s degree in the most previous school term with an interest in pursuing an advanced degree in the same or similar discipline at the conclusion of the internship.\n \n\n**Preferred Qualifications: \n**\n * Coursework related to civil engineering, site design, stormwater management, water quality, hydrology and hydraulics, stream restoration, or related classes.\n * Capable of using spreadsheets, word processing, and standard office software.\n * Strong written and verbal communication skills.\n * Prior internship experience a plus.\n \n\n**Additional Information \n**\n * Relocation assistance is not available for this position.\n * Sponsorship for US employment authorization is not available now or in the future for this position.\n * The selected candidate must be available to work in Germantown, Maryland on a scheduled basis.\n \n\nOffered rate of compensation will be based on individual education, qualifications, experience, and work location. The range for this position is $20 to $26. \n \n**About AECOM \n** \nAECOM is proud to offer comprehensive benefits to meet the diverse needs of our employees. Depending on your employment status, AECOM benefits may include medical, dental, vision, life, AD&D, disability benefits, paid time off, leaves of absences, voluntary benefits, perks, flexible work options, well-being resources, employee assistance program, business travel insurance, service recognition awards, retirement savings plan, and employee stock purchase plan. \n \nAECOM is the global infrastructure leader, committed to delivering a better world. As a trusted professional services firm powered by deep technical abilities, we solve our clients’ complex challenges in water, environment, energy, transportation and buildings. Our teams partner with public- and private-sector clients to create innovative, sustainable and resilient solutions throughout the project lifecycle – from advisory, planning, design and engineering to program and construction management. AECOM is a Fortune 500 firm that had revenue of $16.1 billion in fiscal year 2025. Learn more at aecom.com. \n \n**What makes AECOM a great place to work \n** \nYou will be part of a global team that champions your growth and career ambitions. Work on groundbreaking projects - both in your local community and on a global scale - that are transforming our industry and shaping the future. With cutting-edge technology and a network of experts, you’ll have the resources to make a real impact. Our award-winning training and development programs are designed to expand your technical expertise and leadership skills, helping you build the career you’ve always envisioned. Here, you’ll find a welcoming workplace built on respect, collaboration and community—where you have the freedom to grow in a world of opportunity. \n \nAs an Equal Opportunity Employer, we believe in your potential and are here to help you achieve it. All your information will be kept confidential according to EEO guidelines. \n \n**ReqID:** J10144869 \n \n**Business Line:** Water \n \n**Business Group:** DCS \n \n**Strategic Business Unit:** East \n \n**Career Area:** Engineering \n \n**Work Location Model:** On-Site \n \n**Compensation:** USD 20 - USD 26 - hourly \n \n \n\nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nInternship \n * ### Job function \nEngineering and Information Technology \n * ### Industries \nArchitecture and Planning, Civil Engineering, and Construction \n\nReferrals increase your chances of interviewing at AECOM by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D15656&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Engineer Intern jobs in **Germantown, MD**. \n[ Sign in to create job alert ](https://www.linkedin.com/login?emailAddress=&fromSignIn=&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2Fengineering-intern-at-aecom-4375768058%3Fposition%3D25%26pageNum%3D0%26refId%3DL15VxMG8eQHcS6onQldMFA%253D%253D%26trackingId%3DyI4pp0lDC9%252BqC2tHLyfWrg%253D%253D&trk=public_jobs_job-alert-guest-         const pageSize = 15;
        let currentPage = 1;
        let totalPages = Math.ceil(jobsData.length / pageSize);

        function toggleDesc(el) {
            el.classList.toggle('expanded');
            el.innerHTML = el.classList.contains('expanded') 
                ? escapeHtml(el.dataset.full) 
                : escapeHtml(el.dataset.full).substring(0, 200) + '... <span class="show-more">展开</span>';
        }

        function renderTable() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageJobs = jobsData.slice(start, end);
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = pageJobs.map(job => {
                const salary = formatSalary(job);
                const type = formatType(job.employment_type);
                const date = formatDate(job.posted_date);
                const desc = job.description_text || '-';
                const shortDesc = desc.length > 200 
                    ? desc.substring(0, 200) + '... <span class="show-more">展开</span>' 
                    : desc;
                const escapedFull = escapeHtml(desc).replace(/"/g, '&quot;');
                return `<tr>
                    <td class="title">${escapeHtml(job.job_title)}</td>
                    <td class="company">${escapeHtml(job.company_name)}</td>
                    <td class="location">${escapeHtml(job.city)}, ${escapeHtml(job.state)}</td>
                    <td class="salary">${salary}</td>
                    <td><span class="type">${type}</span></td>
                    <td class="date">${date}</td>
                    <td class="desc" data-full="${escapedFull}" onclick="toggleDesc(this)">${shortDesc}</td>
                </tr>`;
            }).join('');
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
        }

        function renderPageNumbers() {
            const container = document.getElementById('pageNumbers');
            let html = '';
            const maxVisible = 5;
            let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
            let end = Math.min(totalPages, start + maxVisible - 1);
            if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1);
            for (let i = start; i <= end; i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            container.innerHTML = html;
        }

        function prevPage() { if (currentPage > 1) { currentPage--; renderTable(); renderPageNumbers(); } }
        function nextPage() { if (currentPage < totalPages) { currentPage++; renderTable(); renderPageNumbers(); } }
        function goToPage(page) { currentPage = page; renderTable(); renderPageNumbers(); }

        function formatSalary(job) {
            if (job.salary_min && job.salary_max) {
                const currency = job.salary_currency === 'USD' ? '$' : (job.salary_currency || '');
                const interval = job.salary_interval === 'HOUR' ? '/小时' : (job.salary_interval === 'YEAR' ? '/年' : '');
                return `${currency}${job.salary_min}-${job.salary_max}${interval}`;
            }
            return '-';
        }

        function formatType(type) {
            const types = { 'INTERNSHIP': '实习', 'FULL_TIME': '全职', 'PART_TIME': '兼职', 'CONTRACT': '合同', 'TEMPORARY': '临时' };
            return types[type] || type || '-';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('stats').textContent = `共 ${jobsData.length} 个职位 · 更新时间：2026-03-28 14:37:34 · 每页显示 ${pageSize} 条，点击描述可展开`;
        renderTable();
        renderPageNumbers();
    </script>
