tential opportunity to participate in field/site visits to evaluate and observe roadway construction, utilities coordination, and drainage system \n \n \n\n **Who You Are \n \n**\n * Currently pursuing or recently completed BS in Civil Engineering or Environmental Engineering from an accredited university\n * 0-2 years of relevant experience in transportation engineering\n * Availability for winter 2026 and/or summer 2026 internship terms\n * Sponsorship is not available for this role \n \n \n\nCommitment \n \nJoining Lochner means gaining access to a comprehensive suite of benefits designed to support your health and financial well-being throughout your career. \n \nBenefits (Eligible for Full Time Employees) \n \n **Lochner Provides An Extensive Total Rewards Package That Includes \n \n**\n * Competitive Premiums for Medical, Dental, and Vision\n * Paid Time Off and Flexible Holiday Program\n * Company Paid Disability (includes paid Maternity Leave), and Life Insurance\n * Health Savings Accounts (HSA) with Employer Contribution\n * Flexible Spending Accounts (FSA) for Medical Expenses and/or Dependent Care\n * Paid Family Leave\n * Retirement Plan with Employer Match \n * Flexible Work Schedules (Hybrid or Remote, when possible)\n * Wellness Program for Physical and Mental Health\n * Lochner Cares Non-Profit 501c3\n * Education and Training Assistance\n * Employee Assistance Program\n * Employee Discounts\n * Paid Time Off for Charitable Acts of Service \n \n \n\nWhat we offer – Learn more \n \nWork Environment \n \nThe work environment characteristics described are representative of those an employee encounters while performing the essential functions of this job. Reasonable accommodations may be made to enable individuals with disabilities to perform the essential functions. While performing the duties of this job, the employee is regularly exposed to moving mechanical parts and outside weather conditions. The noise level in the work environment is usually loud. \n \nPhysical Requirements \n \nThe physical requirements must be met by an employee to successfully perform the essential functions of this job. Reasonable accommodations may be made to enable individuals with disabilities to perform the essential functions. Intermittent sitting, walking, standing, bending, squatting, climbing, kneeling, twisting, stoop, crawl, and lifting. The employee must frequently lift and/or move light equipment up to 20 pounds. Must be alert to equipment in the field, occasional need to work near hazardous equipment and machinery, occasional need to walk on uneven ground, exposure to dust, gas or fumes, exposure to noise, extremes in temperature or humidity, and potential work at heights. \n \nEqual Employer \n \nLochner is proudly committed to recruiting and retaining a diverse and inclusive workforce. Lochner provides equal employment opportunities to all employees and applicants for employment and prohibits discrimination and harassment of any type without regard to race, color, religion, age, sex, national origin, disability status, genetics, protected veteran status, sexual orientation, gender identity or expression, or any other characteristic protected by federal, state, or local laws. \n \nAll positions at Lochner require an applicant who has accepted an employment offer to undergo pre-employment screening. Background checks include SSN/SIN validation, motor vehicle verification, education verification, employment verification, a criminal check, search against global sanctions and government watch lists, and drug tests. All employment offers are contingent upon successful results of the pre-employment screening. \n \nCalifornia Privacy Policy \n \nPrivacy Policy \nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nInternship \n * ### Job function \nDesign and Engineering \n * ### Industries \nCivil Engineering \n\nReferrals increase your chances of interviewing at Lochner by 2x\n[ See who you know  elements. Developing an understanding of state and local storm water regulations, building codes and industry standards is expected. The successful candidate should demonstrate a basic knowledge of civil related calculations, reports, technical specifications, cost estimates, and supporting the permitting and construction phases of projects. The ability to communicate effectively, clearly and concisely, both verbally and written to diverse audiences in most setting is desirable. Basic understanding of electrical substation assembly and safe design practices is a plus. \n \nThe engineer shall possess entry level experience and/or understanding of civil and structural engineering topics especially related to substation design and construction. Solutions typically provided by the engineer may involve complex issues, requiring interpretation of requirements, application of analytical techniques and non-standard solutions. Candidate should have the flexibility to deal with shifting budgets and priorities; the ability and resiliency to adapt to changes; and a personality that promotes optimism and synergy. \n \nUpholds the safety compliance standards inherent in PSE’s operating and/or field procedures related to work responsibilities. Promotes and supports a culture of total safety. \n \nDemonstrates commitment to conduct business honestly, ethically and consistent with our core values and Code of Conduct. Ensures duties are performed in accordance with all regulatory compliance obligations. \n \nThis job is considered “safety sensitive” as defined in RCW 49.44.240 and is subject to pre-employment drug screening that includes screening for the presence of marijuana and marijuana metabolites. \n \n ** **Job Responsibilities \n \n****\n * Applies basic engineering principles, practices, theories and methods and use of commonly applied engineering approaches and calculations.\n * Uses judgment in the selection and application of engineering methods, the modification of standard models, designs, or procedures, and when correlating data and recognizing discrepancies in results.\n * Prepares cost estimates and specifications, performs engineering studies and designs, conducts office and field research.\n * Plans and develops project budgets with appropriate project documentation.\n * Provides verification and field measurements of new equipment and system installations.\n * Acquires performance data from new and existing equipment or systems and validates against design parameters.\n * Supports emergency response work as requested including immediate and extended restoration efforts driven by weather and other system failures.\n * Performs other duties as assigned. \n \n\n **Minimum Qualifications \n \n**\n * ABET accredited or completed NCEES Credentials evaluated Bachelor of Science degree in electrical, mechanical, civil or other appropriate engineering discipline. An EIT or FE certificate may qualify in lieu of ABET accreditation.\n * Entry level to 3 years of experience in engineering design, preparation of specifications, technical field work, or system studies. Other prior non-engineering work experience may be considered for individuals at this level. \n \n\n **Desired Qualifications \n \n**\n * Possession of or ability to acquire an EIT certificate.\n * Knowledge of engineering economics and analysis.\n * Experience in project cost estimating or scheduling.\n * Work or internship experience in utility engineering or related fields. \n \n\n ** **Additional Information \n \n**** At PSE, we value our employees and provide them with opportunities to excel. We offer a competitive and comprehensive total rewards package. To learn more about why PSE is a great place to work, see our Employee Value Proposition , which highlights our commitment to employee growth, work-life balance, and meaningful career opportunities in the energy sector. \n \nThe pay range for this position is $80,200.00 - $115,800.00, and this position is eligible for annual goals based incentive bonuses. \n \nPSE offers a suite of benefits to our employees. Employees are eligible for medical, dental, vision, basic life, and short- and long-term disability insurance. There are additional voluntary options of supplemental life insurance, accidental death and dismemberment insurance, flexible spending accounts for health care and dependent daycare, and an Employee assistance program (EAP). For long term savings, PSE offers a 401(k) investment option and a cash balance retirement plan. Employees will also receive Paid Time Off (PTO) and Paid Holidays throughout the calendar year. Detailed benefit overviews can be found on our Career page - Why Work For Us (pse.com) . \n \nFamilies and businesses depend on PSE to provide the energy they need to pursue their dreams. Our steadfast commitment to serving Washington communities with safe, dependable and efficient energy started in 1873. Today we're building the Northwest's energy future through efforts like our award winning energy efficiency programs and our leadership in renewable energy. \n \nPuget Sound Energy is committed to providing equal employment opportunity to all qualified applicants. We do not discriminate on the basis of race, color, religion, sex, national origin, age, sexual orientation, gender identity, marital status, veteran status or presence of a disability that with or without reasonable accommodation does not prevent performance of the essential functions of the job, or any other category prohibited by local, state or federal law. \n \nShould you have a disability that requires assistance and/or reasonable accommodation with the job application process, please contact the Human Resources Staffing department at jobs@pse.com or 425-462-3017. \nShow more Show less \n * ### Seniority level \nEntry level \n * ### Employment type \nVolunteer \n * ### Job function \nEngineering \n * ### Industries \nUtilities \n\nReferrals increase your chances of interviewing at Puget Sound Energy by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D165596&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Civil Engineer jobs in **Snoqualmie, WA**. \n[ Sign in to create job alert ](https://www.linkedin.com/login?emailAddress=&fromSignIn=&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2F4391483661&trk=public_jobs_job-alert-guest-redirect-cta)\n`` `` ``\n##"}, {"job_title": "Civil Engineering Design Intern", "company_name": "Ardmore Roderick", "city": "Chicago", "state": "IL", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 25.0, "salary_max": null, "salary_interval": "HOUR", "posted_date": "2026-03-25T00:00:00", "description_text": "About Us: Ardmore Roderick is a full-service infrastructure solutions firm specializing in Utilities, Transportation, Aviation, Rail and Transit, Building and Facilities Projects. Headquartered in Chicago, IL with offices in Florida, Illinois, North Carolina, Ohio, Pennsylvania, Tennessee and Texas. Vision: Reimaging infrastructure to improve lives and communities. Mission: Transforming communities by empowering the best minds to deliver innovative infrastructure solutions. Job Overview: We are seeking a Summer 2026 Civil Engineering Design Intern to join our Transportation Design team. This opportunity will be located in our Chicago, IL office and could have potential to be hybrid. Key Responsibilities: Support the civil engineering roadway team on various tasks for assigned team projects. Learn basic principles of civil engineering in public roadway design projects. Assist with project research and preliminary design calculations and analysis. Support preparation of final design plans, special provisions and cost estimates. Assist in collecting and maintaining project documentation. Required Qualifications: Currently pursuing a four- options.\n- Time Off: Personal leave, flexible scheduling, floating holidays, and half-day Fridays.\n- Financial Wellness: Student loan matching in our 401(k), and performance-based bonuses.\n- Professional Development: Tuition reimbursement and extensive internal training programs.\n- Family-Friendly Benefits: New Parent Leave, family building benefits, and childcare resources."}, {"job_title": "Engineering Intern - Civil", "company_name": "Matanuska-Susitna Borough", "city": "Palmer", "state": "AK", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-25T00:00:00", "description_text": "This position is responsible for assisting project managers and/or engineers with civil engineering-related projects as assigned. Work is performed and duties are carried out in accordance with established policies, procedures, and Borough core values: Accountability, Customer Focus, Dedication, Integrity, Responsiveness and Teamwork. This is temporary summer position. This assignment will start May 4, 2026 and end on October 30, 2026 or sooner dependent on funding.\n\nQualifications:\nHigh school diploma or equivalent, and specialized training in the field of work including college courses, certificate program, apprenticeship, etc.\nCurrent enrollment in an undergraduate or graduate program in engineering, construction management or related coursework.\nLess than one year of experience.\nPossession of or ability to readily obtain a valid driver's license issued by the State of Alaska for the type of vehicle or equipment operated.\nMust successfully pass a pre-employment drug screen, physical and background check.\n\nDuties:\nAssists with review of plans, cost estimates and specifications.\nAssists with inspection of the construction of capital projects for compliance with contract requirements; documents daily activities of projects and inventory of materials and equipment.\nConducts engineering project research and inventory of transportation related assets.\nAssists with drafting engineering documents such as roadway plans, utility agreements, design standards, project concepts, etc.\nPrepares material quantity and cost estimates.\nMaintain documentation on all assigned projects.\nAssist with or coordinate the installation and/or relocation of utility service and assist with permitting.\nCompletes special projects which require research, evaluation of material, and preparation of recommendations.\nReviews Storm Water Pollution Prevention Plans (SWPPP) and Subdivision development drainage plans, and carries out needed inspections in the field.\nAssists with inspections and surveys.\nDrafts reports and briefing papers.\nPerforms related duties."}, {"job_title": "Civil Engineering Intern", "company_name": "Parsons Corporation", "city": "Newark", "state": "NJ", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 22.93, "salary_max": 40.14, "salary_interval": "HOUR", "posted_date": "2026-03-25T00:00:00", "description_text": "Parsons is seeking motivated Civil Engineering (Transportation) Interns to join our New Jersey Transportation group for the Summer 2026 term. In this role, you will gain practical experience on major infrastructure projects!\n\nWhat You'll Be Doing:\n- Prepare construction documents, including drawings, specifications, and cost estimates\n- Assist with the geometric design of highways and roadways, including horizontal and vertical alignments, cross sections, superelevation diagrams, gore details, vertical clearance calculations, and grading plans\n- Perform material quantity takeoffs, cost estimates, and field surveys as required\n- Use design software and CAE/CAD applications to develop and implement project designs\n- Provide technical guidance and input to CAD drafters, designers, and other engineers working on the project team\n- Perform additional responsibilities as assigned to support project delivery\n\nWhat Qualifications You'll Bring:\n- Currently enrolled in a bachelor's or master's degree program in civil engineering or related field\n- Minimum GPA of 3.0\n- Prior transportation or infrastructure engineering internship experience preferred\n- Ability to communicate effectively both orally and in writing\n- Strong interpersonal, teamwork, and leadership skills\n- Eager to learn, self-motivated, and flexible\n- Excellent organizational and management skills\n- Working knowledge of CAD software, such as AutoCAD and Microstation is a plus\n\nSalary Range: $22.93 - $40.14 per hour\n\nSecurity Clearance: None\n\nJob ID: R178779"}, {"job_title": "College Intern - Water Resources", "company_name": "RK&K", "city": "Columbia", "state": "SC", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-25T00:00:00", "description_text": "This internship is for Engineering Students with an interest in Civil Engineering with an emphasis in Water Resources. In this role, interns will gain insight into various aspects of engineering including hydrologic and hydraulic design, forecasting, and modeling. Our College Interns will be exposed to various challenges, projects and technology related to road drainage, erosion control, bridge hydraulic design, scour, and resiliency, and will complete tasks both in the office and in the field as needed. RK&K has been a premier Civil Engineering firm across the US for over 100 years. Many of our current employees started their careers as Interns at RK&K. Come join and design your career as part of our talented team! Required Skills And Experience: Currently pursuing a degree in Civil Engineering or related field. Proficient knowledge of Microsoft Office products (Word, Excel, PowerPoint). Strong attention to detail. Ability to work both independently and in a team environment. Excellent written and oral communication skills. Valid driver's license. Preferred: Classwork in Civil/Water Resources Engineering. Participation in professional societies (ASCE, ITE). Applicable prior internship experience. Why RK&K? As a full-service engineering and construction management firm, RK&K gives you the opportunity to directly impact the communities in which we live and work. What sets RK&K apart is an award-winning culture that has fostered a spirit of collaboration and trust for over 100 years. To its clients, the firm delivers concepts, processes, and outcomes that are designed for success. RK&K has earned its reputation as a trusted partner, responsive employer, and community steward."}, {"job_title": "Civil Engineering Intern (Roadway) - Summer 2026", "company_name": "RS&H", "city": "Raleigh", "state": "NC", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-25T00:00:00", "description_text": "The Opportunity We currently seek a Civil Engineering Intern in our Raleigh, NC office. The Civil Engineering Intern will be mentored by and collaborate with the top Engineering associates on our team. The selected candidate will work with associates assisting on a variety of conventional and design-build projects that combine innovative roadway design with a strong knowledge of technical standards to exceed client expectations and provide cost-effective solutions. This is an amazing opportunity to gain hands-on experience and a better understanding of the Transportation Engineering Industry. Responsibilities: Perform routine calculations requiring knowledge and application of basic engineering principles. Prepare and revise plan documents details. Collect and prepare data for evaluation. Perform engineering tasks with the use of computer-assisted design software and equipment. Provide support to engineering and project management associates. Qualifications: Current student pursuing a Bachelor's or Master's degree in Civil Engineering at an ABET-accredited university. Excellent written and verbal communication skills. Ability to work on multiple assignments simultaneously. Strong work ethic aligning with the company's mission and core values. Preferred: 2.5 GPA or above. Prior internship or related experience. AutoCAD and/or Microstation experience. Specific interest in Transportation/Roadway Design."}, {"job_title": "Civil/Structural Engineering Intern (Renewable Transmission Interconnections) - Summer 2026", "company_name": "WSP in the U.S.", "city": "Billings", "state": "MT", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 23.03, "salary_max": 29.96, "salary_interval": "HOUR", "posted_date": "2026-03-25T00:00:00", "description_text": "WSP USA - Civil/Structural Engineering Intern (Renewable Transmission Interconnections) - Summer 2026 (Billings, MT)\n\nJob DescriptionThis OpportunityWSP USA hosts hundreds of internships across the United States to gain hands-on, meaningful work experience to enhance their education and professional aptitude. Our interns gain exposure to real projects while working side by side with senior staff. Through our Developing Professionals Network, interns gain mentorship, networking opportunities and lifelong career connections.Our Power and Energy Team is seeking a Full Time Civil/Structural Engineering Intern (Renewable Transmission Interconnections) - Summer 2026 to work out of our Billings, MT office. This temporary position is seeking individuals currently enrolled in an Undergraduate or Graduate degree program.This internship will be part of the WSP Summer Internship Program. As a summer intern, you have the opportunity to participate in our 12-week program scheduled to start on May 18th, 2026. The individual start date of the internship may be flexible.As one of the world's leading professional service firms, WSP now brings world-class expertise in power delivery, power generation, and project management with the recent acquisition of POWER Engineers Inc. Our vision is to be the preeminent pure-play global consulting firm for the world's energy transition. And we need your help.Your ImpactSupport a variety of engineering tasks with the goal to develop technical, social, and ethical skills.Learn basic principles of Civil/Structural Engineering.Assist with project research, field work, and preliminary design calculations and analysis.Support preparation of final design plans, special provisions, and cost estimates.Assist in collecting and maintaining project documentation.Be involved in all aspects of the developer interconnection process and delivery of renewable energy onto the electrical grid.Interconnection application support through the detailed design of low to extra-high-voltage renewable collector substations to include one-line diagrams, control and relaying schematics, wiring diagrams, SCADA, communications, conduit and cable sizing/routing, substation layout, etc. Perform design calculations in accordance with industry standards such as IEEE, NEC, NESC, ASCE, etc.Assist senior engineers with QA/QC design checks, assisting design engineers with design efforts for renewable collector substation civil/structural, physical, protection/control design and the transmission gen-tie civil/structural design.Complete training on assigned tasks.Exercise responsible and ethical decision-making regarding company funds, resources and conduct, and adhere to WSP's Code of Conduct and related policies and procedures.Perform additional responsibilities as required by business needsPlease note that there is no relocation or housing assistance associated with this internship. Who You AreRequired QualificationsActively enrolled in an accredited Civil/Structural Engineering, or related, Undergraduate program with an anticipated graduation date of August 2026 or later.Must be 18 or older.Demonstrated interest in Consulting Engineering, Renewable Energy, or related field, and have a strong desire to advance skills related to WSP's work and projects.Competent interpersonal and communication skills when interacting with others, expressing ideas effectively and professionally to an engineering and non-engineering audience.Capable of taking direction from leadership, mentors, and managers to executive projects.Basic proficiency with technical writing, office automation, software, spreadsheets, technology, and tools.Proven track record of upholding workplace safety and ability to abide by WSP's health, safety and drug/alcohol and harassment policies.Authorization to work in the United States at the start of the internship. Preferred QualificationsSuccessful completion of junior-level courses in power system analysis and/or power system protection is a plus for an electrical engineering student.Successful completion of junior-level courses in structural analysis, concrete, steel, soils, foundations, and surveying for a civil/structural engineering student.Attention to detail, time management, and organizational skills will be critical for the successful completion of tasks.Prior internship and/or related engineering experience is a plus.Students who have passed or are scheduled to take the FE/EIT exam will be strongly considered for this position.Familiarity with design, drafting or engineering software such as MATHCAD, SOLIDWORKS, AUTOCAD, etc. as well as Microsoft Excel is beneficial. CompensationExpected Pay: $23.03- $29.96 per hourWSP USA is providing the compensation range that the company in good faith believes it might pay and offer for this position, based on the successful applicant's education, experience, knowledge, skills, abilities in addition to internal equity and specific geographic location. WSP USA reserves the right to ultimately pay more or less than the posted range and offer additional benefits and other compensation, depending on circumstances not related to an applicant's sex or other status protected by local, state, and/or federal law.About WSP ABOUT US WSP U ngineering Intern- Summer 2026", "company_name": "WSP in the U.S.", "city": "Lisle", "state": "IL", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 19.0, "salary_max": 30.0, "salary_interval": "HOUR", "posted_date": "2026-03-25T00:00:00", "description_text": "WSP in the U.S. - Civil Engineering Intern - Summer 2026\n\nJob Description\nThis Opportunity\nWSP USA hosts hundreds of internships across the United States to gain hands-on, meaningful work experience to enhance their education and professional aptitude. Our interns gain exposure to real projects while working side by side with senior staff. Through our Developing Professionals Network, interns gain mentorship, networking opportunities and lifelong career connections.\n\nOur GEC Team is seeking a Full-Time Civil Engineering Intern to work out of our Lisle, IL office. This temporary position is seeking individuals currently enrolled in an Undergraduate or Graduate degree program.\n\nThis internship will be part of the WSP Summer Internship Program. As a summer intern, you have the opportunity to participate in our 12-week program scheduled to start on May 18th, 2026. The individual start date of the internship may be flexible.\n\nYour Impact:\n- Support a variety of engineering tasks with the goal to develop technical, social, and ethical skills.\n- Learn basic principles of Civil Engineering.\n- Assist with project research, field work, and preliminary design calculations and analysis.\n- Support preparation of final design plans, special provisions, and cost estimates.\n- Assist in collecting and maintaining project documentation.\n- Complete training on assigned tasks.\n- Independently complete a defined design task using Bentley OpenRoads Designer and deliver a final design product at the end of the internship.\n- Exercise responsible and ethical decision-making regarding company funds, resources and conduct, and adhere to WSP's Code of Conduct and related policies and procedures.\n- Perform additional responsibilities as required by business needs.\n\nPlease note that there is no relocation or housing assistance associated with this internship.\n\nWho You Are\nRequired Qualifications:\n- Actively enrolled in an accredited civil engineering, or related, Undergraduate program with an anticipated graduation date of December 2026 or later.\n- Must be 18 or older.\n- Authorization to work in the United States at the start of the internship.\n- Have a valid Driver License and a vehicle to report daily at WSP Office at 2200 Western Ct #120, Lisle, IL 60532.\n- Demonstrated interest in Civil engineering, or related field, and have a strong desire to advance skills related to WSP's work and projects.\n- Competent interpersonal and communication skills when interacting with others, expressing ideas effectively and professionally to an engineering and non-engineering audience.\n- Capable of taking direction from leadership, mentors, and managers to executive projects.\n- Basic proficiency with technical writing, office automation, software, spreadsheets, technology, and tools.\n- Proven track record of upholding workplace safety and ability to abide by WSP's health, safety and drug/alcohol and harassment policies.\n\nPreferred Qualifications:\n- Actively enrolled in an accredited civil engineering or related, Bachelor, Masters or PhD program with an anticipated graduation date of December 2026 or later.\n- Basic experience (in a university course or prior work experience) with at least one of the following software applications: AutoCAD, AutoCAD Civil 3D, Bentley OpenRoads Designer, or MicroStation.\n- Prior internship or leadership involvement on campus.\n\nCompensation: Expected Salary (all locations): $19 - $30"}, {"job_title": "Environmental Engineer Intern", "company_name": "Midrex Technologies, Inc.", "city": "Charlotte", "state": "NC", "employment_type": "FULL_TIME", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interv s software.\n * Strong interpersonal skills and written/oral communication skills.\n * Excellent base of chemical engineering technical skills and knowledge of processes.\n * Ability to meet schedule and deliverable deadlines. \n \n\n **Education and Experience: \n**\n * Pursuing a Bachelor’s or Master’s Degree in Environmental Engineering or related field.\n * Minimum 3.0 cumulative GPA. \n \n\n **Travel REQUIREMENTS: \n**\n * N/A \n \n\n **Physical Requirements: \n**\n * Prolonged periods of sitting at a desk and working on a computer.\n * Ability to move around a fabrication shop and an industrial plant site, including safely climbing inside and around structures and equipment. \n \n\n **Other duties: \n** Please note this position description is not designed to cover or contain a comprehensive listing of activities, duties or responsibilities that are required of the employee for this position. Duties, responsibilities and activities may change at any time with or without notice. \nMidrex is an equal opportunity employer and is committed to providing employment opportunities to all qualified individuals without regard to race, color, religion, sex, national origin, age, disability, or any other protected status in accordance with all applicable laws. In compliance with the Americans with Disabilities Act, Midrex will provide reasonable accommodations to qualified individuals with disabilities and encourages both prospective and current employees to discuss potential accommodations with the People and Culture department. \nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nInternship \n * ### Job function \nEngineering and Information Technology \n * ### Industries \nIndustrial Machinery Manufacturing \n\nReferrals increase your chances of interviewing at Midrex Technologies, Inc. by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCu eable and experienced professionals in the world. When you join our team, you'll work alongside industry leaders who are advancing the science of water, protecting public health, and building resilient communities.\n\nCarollo's vision is to be the best water consulting firm and the best place for you to build your career. If you're passionate about making a difference in this critical field, we invite you to explore a career with Carollo.\n\nResponsibilities\n- Perform engineering work in various engineering fields (water and wastewater treatment, and engineering services during construction)\n- Work on engineering designs\n- Assist preparing reports\n- Develop plans and specifications, and cost estimates for various projects\n- Check submittals for performance or conformity with plans and specifications\n- Assist with the preparation of technical memoranda, reports and electronic deliverables\n- Data entry and analysis\n- Participate in field activities such as site investigations, and pilot testing\n\nQualifications\n- High School Diploma or equivalent\n- Finishing or completed junior year of college\n- Currently pursuing a Bachelor's or Master's Degree in Civil or Environmental Engineering field\n- Strong verbal and written communication skills\n- Proficient in Microsoft Word and Excel\n\nPreferred Qualifications\n- Experience and/or coursework in water/wastewater treatment and conveyance\n- Previous related internship experience a plus, but not required\n- Passed or scheduled for the FE/EIT exam\n- Experience using CAD software (AutoCAD, Microstation, Revit, Sketch Up)"}, {"job_title": "Civil/Environmental Engineering Intern", "company_name": "Carollo Engineers", "city": "Phoenix", "state": "AZ", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-24T00:00:00", "description_text": "Overview\nCarollo Engineers is a leading engineering firm dedicated exclusively to water. For over 90 years, we've specialized in the planning, design, and construction of water, wastewater, stormwater, and reuse facilities.\n\nResponsibilities\nPerform engineering work in various engineering fields (water and wastewater treatment, and engineering services during construction)\nWork on engineering designs\nAssist preparing reports\nDevelop plans and specifications for various projects\nCheck submittals for performance or conformity with plans and specifications\nAssist with the preparation of technical memoranda, reports and electronic deliverables\nData entry and analysis\nParticipate in field activities such as site investigations, and pilot testing\n\nQualifications\nHigh School Diploma or equivalent\nFinishing or completed junior year of college\nCurrently pursuing a Bachelor's or Master's Degree in Civil or Environmental Engineering field\nStrong verbal and written communication skills\nProficient in Microsoft Word and Excel\n\nPreferred Qualifications\nExperience and/or coursework in water/wastewater treatment and conveyance\nPrevious related internship experience a plus, but not required\nPassed or scheduled for the FE/EIT exam"}, {"job_title": "Assistant Water Resources Specialist", "company_name": "EBMUD", "city": "Oakland", "state": "CA", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 11629.0, "salary_max": null, "salary_interval": "HOUR", "posted_date": "2026-03-24T00:00:00", "description_text": "EBMUD - Assistant Water Resources Specialist\n\nDo you want to work for a water agency that is serious about sustainably managing water resources and protecting the environment? Are you enthusiastic about how computer models are used to help shape robust policy and management outcomes? Do you enjoy learning about and using computer modeling software, running scripts, and writing code?\n\nIf so, the East Bay Municipal Utility District (EBMUD) encourages you to apply for the Assistant Water Resources Specialist position in the Water Resources Planning Division's Water Supply Systems Modeling Section, which is part of EBMUD's Water and Natural Resources Department.\n\nThe selected candidate will be given opportunities to conduct computer modeling analyses and studies of water supply and water quality in the Mokelumne, Sacramento-San Joaquin Delta and Central Valley. The selected candidate will provide technical analysis of water resources issues and modeling to better predict water supply, water quality, and environmental impacts of EBMUD projects.\n\nDuties Include:\n- Participating in EBMUD workgroups or teams in a collaborative framework to advance EBMUD projects and initiatives.\n- Researching and reviewing technical literature regarding new computer models and/or analytical techniques.\n- Engaging with peer groups in academia, professional organizations, and water utilities to advance the use of numerical modeling approaches.\n- Preparing memoranda and reports documenting the results of technical analyses.\n- Reviewing environmental documentation and permit applications to identify potential impacts on EBMUD water supply sources and water quality.\n- Applying, maintaining, improving, and/or developing alternate analytical tools to better predict water supply and water quality.\n\nCompetitive candidates will share these values and additionally have the following attributes:\n- Academic coursework in numerical methods and computer modeling of hydraulic and hydrological systems.\n- Experience with surface water resources systems analysis.\n- Computer programming, data analytics, and data visualization experience. Python experience is preferred.\n- Knowledge of California Environmental Quality Act (CEQA) and California water rights issues.\n\nThe salary range for Assistant Water Resources Specialist is $11,629 per month increasing to $12,210, $12,821, $13,462, and $14,135 after 6, 18, 30, and 42 months, respectively.\n\nThis position may be eligible for a hybrid onsite and telecommuting option, subject to review and approval by senior management.\n\nEducation: A bachelor's degree from an accredited college or university with a major in engineering, mathematics, statistics, physics, water resources management, or a closely related field. Requires two years of experience in water resources engineering, analysis or planning that has included significant numerical modeling and computer programming responsibilities.\n\nMust possess a valid California driver's license and have a satisfactory driving record."}, {"job_title": "Intern / Co-Op – Civil / Environmental Engineering", "company_name": "Geosyntec Consultants", "city": "Ann Arbor", "state": "MI", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-24T00:00:00", "description_text": "Geosyntec Consultants - Intern / Co-Op - Civil / Environmental Engineering\n\nOverview\nDo you want to build an impactful career to change the world for the better?\n\nGeosyntec has an exciting opportunity for an Intern / Co-Op - Civil / Environmental Engineering in our Ann Arbor or Detroit, Michigan office. The position offers the opportunity to apply engineering (civil, geotechnical) academic knowledge to real-world situations while also learning the business skills needed for a successful consulting career. The position is full-time (40 hours/week) for approximately 13 to 15 weeks during the summer of 2026. Preferred candidates would have the ability to return to the position for up to two additional semester rotations during their undergraduate or graduate studies. Candidates are responsible for coordinating their own transportation to and from the office.\n\nGeosyntec is an innovative, international engineering and consulting firm serving private and public-sector clients to address new ventures and complex problems involving our environment, natural resources, and civil infrastructure. Our engineers, scientists, technical and project employees serve our clients from offices across the world. Ranked by ENR as one of the top environmental engineering design firms, Geosyntec is internationally known for its technical leadership, broad experience, and exceptional client service.\n\nWe invest in our people. Each employee is unique, and your career at Geosyntec will be too. We offer competitive pay and benefits, and well-being programs to support you and your family.\n\nEssential Duties And Responsibilities:\n- Assist with engineering calculations using computer-based technical tools.\n- Technical writing of reports, letters, memoranda, plans, specifications, and proposals.\n- Data input and analysis, including preparing maps, tables, and figures.\n- Follow instructions and interact with engineers, geologists, office administrative staff, CADD operators (draftsmen), contractors and construction personnel.\n- Potential for fieldwork such as soil and groundwater sampling, dam safety inspections, and drilling and contractor oversight.\n- Drive personal, company, and rental vehicles to client or company project or office sites, and other business locations, as needed.\n\nEducation and Licensure:\n- Currently registered in a Bachelor's or Master's university degree program in a relevant engineering discipline. (required)\n- Degree focus area in civil or geotechnical engineering. (preferred)\n\nSkills, Experience And Qualifications:\n- Experience with Microsoft Office and/or CADD. (preferred)\n- Outstanding academic credentials and exceptional interpersonal, technical writing, oral and written communication and problem-solving skills. (required)\n- Valid U.S. driver's license, reliable transportation, and satisfactory driving record for business travel to project sites. (required)"}, {"job_title": "Graduate Construction Project Engineer - AECOM Tishman", "company_name": "AECOM Tishman", "city": "Jamaica", "state": "NY", "employment_type": "FULL_TIME", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-24", "description_text": "Job Description \n** \n**AECOM Tishman** has an exciting opportunity for a talented Construction Project Engineering for our large, state-of-the-art construction project in New York, NY. If you are looking to take your career to the next level with Tishman, apply today! \n \n**The responsibilities of this position include, but are not limited to: \n**\n * Assists the Project Management team with management administration on a small to moderate size and scope project, or a portion of a larger, more complex project, following set guidelines for tasks.\n * Employee receives clear and specific instructions and/or follows standardized instructions or procedures without ongoing supervision.\n * Employee consults with supervisor on matters not covered in the original instructions.\n * May interface with design team.\n * Works closely with construction project teams.\n * Assists with and monitors change orders.\n * Reviews project costs and scheduling to ensure completion of project within budget and in conformance with contract.\n * Works with document control systems, project management systems and other software or databases to keep information flow up-to-date and accurate.\n * Attends meetings and report on project tasks as needed.\n \n\n**About AECOM Tishman \n** \nSince 1898, AECOM Tishman has managed the construction of some of the world’s most iconic buildings. We employ a diversified preconstruction and construction management staff of structural, mechanical, electrical, and civil engineers; architects; technology specialists; scheduling and cost control personnel; and construction estimators and accountants. We provide expert consultation and guidance in all phases of a building project, from master-planning, preconstruction options evaluation and decision-making, to design review, estimating, and scheduling, through procurement, construction and occupancy. AECOM Tishman’s staff manages all consultants and contractors on a project, representing client interests throughout the project cycle. In total, AECOM Tishman has built more than 900 million square feet – including the tallest building in the Western Hemisphere, One World Trade Center in New York. \n \n**Qualifications \n** \nMinimum Requirements: \n\n * Candidate must have completed Bachelor’s degree in Engineering, Construction Management, Civil Engineering, Mechanical Engineering, Architecture or relevant curriculum or demonstrated equivalency of experience and/or education.\n \n\nPreferred Qualifications: \n\n * Experience from a large general contractor as an Engineer, Assistant Superintendent or Assistant Project Manager.\n * Ability to read and interpret construction drawings/renderings.\n * Experience with construction documentation such as change orders, RFI. RFP, etc.\n * Experience with construction software such as Procore, E-Builder, CMiC, etc.\n * Proficient with Microsoft Office Suite (Word, Excel, Teams, Outlook).\n \n\n**Additional Information \n**\n * Sponsorship for US employment authorization is not available now or in the future for this position.\n * Relocation assistance is not available for this position.\n * Qualified applicants who are offered a position must pass a pre-employment substance abuse test.\n * In order to receive a security badge at the client worksite for which you are being hired to perform services, you will be required to pass the client's security screening process to include SWAC (Secure Worker Access Consortium) and/or SIDA (Identification Display Area) and fingerprinting, which will be done after you have commenced employment and is a condition of your continued employment.\n \n\nOffered rate of compensation will be based on individual education, qualifications, experience, and work location. The range for this position is $31.19 to $54.57. \n \n**About AECOM \n** \nAECOM is proud to offer comprehensive benefits to meet the diverse needs of our employees. Depending on your employment status, AECOM benefits may include medical, dental, vision, life, AD&D, disability benefits, paid time off, leaves of absences, voluntary benefits, perks, flexible work options, well-being resources, employee assistance program, business travel insurance, service recognition awards, retirement savings plan, and employee stock purchase plan. \n \nAECOM is the global infrastructure leader, committed to delivering a better world. As a trusted professional services firm powered by deep technical abilities, we solve our clients’ complex challenges in water, environment, energy, transportation and buildings. Our teams partner with public- and private-sector clients to create innovative, sustainable and resilient solutions throughout the project lifecycle – from advisory, planning, design and engineering to program and construction management. AECOM is a Fortune 500 firm that had revenue of $16.1 billion in fiscal year 2025. Learn more at aecom.com. \n \n**What makes AECOM a great place to work \n** \nYou will be part of a global team that champions your growth and career ambitions. Work on groundbreaking projects - both in your local community and on a global scale - that are transforming our industry and shaping the future. With cutting-edge technology and a network of experts, you’ll have the resources to make a real impact. Our award-winning training and development programs are designed to expand your technical expertise and leadership skills, helping you build the career you’ve always envisioned. Here, you’ll find a welcoming workplace built on respect, collaboration and community—where you have the freedom to grow in a world of opportunity. \n \nAs an Equal Opportunity Employer, we believe in your potential and are here to help you achieve it. All your information will be kept confidential according to EEO guidelines. \n \n**ReqID:** J10148326 \n \n**Business Line:** CM Construction Management \n \n**Business ies we serve. In this role, you will contribute to technical engineering work, collaborate with multidisciplinary professionals, and help bring projects from concept through construction. This position offers a blend of technical design, problem-solving, field experience, and client interaction, making it a strong opportunity for engineers who want to grow their careers while making a tangible impact. \n \nThese responsibilities include: \n \n\n * Collaborate with project teams to understand project goals and technical requirements.\n * Use civil engineering design software (AutoCAD, Civil 3D, GIS, or similar) to draft plans, create models, and develop design documents.\n * Prepare calculations, reports, and technical documentation to support engineering analyses and design decisions.\n * Contribute to the development of plans, specifications, cost estimates, and construction documents for civil infrastructure projects.\n * Assist with construction administration tasks, including reviewing submittals, documenting progress, and performing field observations.\n * Support senior engineers and project managers by completing assigned project tasks, coordinating with cross‑disciplinary teams, and maintaining organized project files.\n * Apply engineering principles to solve design challenges, evaluate alternatives, and recommend practical solutions.\n * Participate in site visits and learn construction methods, helping ensure design intent is met during project execution.\n * Follow quality standards, safety practices, and industry regulations to ensure accuracy and compliance in all project work.\n * Manage deadlines and deliverables, contributing to a positive client experience and successful project outcomes. \n \n\n ** _“As employee-owners, we don’t just work here, we grow here. Together, we take on challenging projects, support one another, and create opportunities to thrive. Our culture empowers every team member to find success—professionally and financially—while  accounting, project schedules and other project-related documentation. \n * Develops, maintains, and improves strong relationships with clients and subcontractors through regular communication. \n * Assists in the development of estimates, from conceptual through hard bid estimate levels. \n * Collaborates with architects and design team to develop the best overall product for clients. \n * Collaborates with vendors and subcontractors during bidding, estimating and procurement project phases. \n * Performs other duties as assigned. \n \n\n**You’ll Be a Perfect Fit If You Have \n \n**\n * Bachelor's degree in Construction Management, Engineering, or related field of study. \n * Prior work or internship experience within construction is a plus. \n * Must have excellent written and oral communication skills. \n * Must demonstrate extreme attention to detail. \n * Must possess strong organizational, time management and prioritization skills. \n * Must be able to perform calculations, to problem solve, and use reasoning. \n * Must be able to effectively manage and direct others. \n * All staff are expected to have a strong desire to provide excellent customer service; to comply with the rules and regulations of those companies to which we are accountable; to have high ethical and professional standards of conduct; and to have an attitude of wanting to continuously improve their own professional performance. \n \n\n**Computer Skill Required \n \n**\n * Knowledge of Microsoft Office software (MS Word, MS Excel, MS PowerPoint, MS Outlook, MS Project) \n * Ability to learn Construction Management platform, such as Procore and Foundation. \n \n\n**Physical Demands \n \n** While performing the duties of this job, the employee will spend long hours on construction sites using construction equipment and tools. At times, the weather may be inclement. The position requires repetitive motion, such as standing, walking, sitting, and bending. This position could also entail reaching ed degrees\n- Proficiency in industry-relevant software is preferred but not required. We'll train you!\n- Strong verbal and written communication skills, coupled with analytical and problem-solving abilities.\n- Ability to manage assignments efficiently and maintain organizational skills.\n\nWhy Choose Benesch?\nOur internships and co-op programs are crafted to develop well-rounded professionals who excel in challenging environments. You will gain hands-on experience and meaningful exposure by collaborating with industry experts and clients on real projects. Supported by comprehensive training and resources, our program is the perfect launchpad for your career!\n\nBenefits:\n- Insurance, retirement plans, and wellness programs.\n- Tuition reimbursement for job-related courses.\n- Potential for Benesch to contribute up to 9% of your gross compensation to your retirement plan (5% profit-sharing contribution to your 401(k) plan + 80% match on your contributions up to 4%).\n- Flexible work schedules and hours, including work-from-home options.\n- Generous Paid Time Benefits (PTB). Ten days of paid parental leave for birth, adoption, or foster placement."}, {"job_title": "Civil/Environmental Engineering Intern - Summer 2026", "company_name": "Carollo Engineers", "city": "Edmond", "state": "OK", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-23T00:00:00", "description_text": "Overview: Carollo Engineers is a leading engineering firm dedicated exclusively to water. For over 90 years, we've specialized in the planning, design, and construction of water, wastewater, stormwater, and reuse facilities, bringing innovative and sustainable solutions to the water sector's most complex challenges. We work with water agencies, municipalities, utilities, research organizations, and private companies across various industries, including technology, manufacturing, and beyond. These clie lary_currency": "USD", "salary_min": 37000.0, "salary_max": 56000.0, "salary_interval": "HOUR", "posted_date": "2026-03-21T00:00:00", "description_text": "Braun Intertec Corporation - 2026 Traveling Civil Engineering and Construction Materials Testing 6-month Co-op\n\nJob Description\nBraun Intertec is seeking students pursuing degrees in engineering, construction management, or related field; and other interested candidates to join our Traveling 6-month Co-op opportunity.\n\nChosen Co-ops will receive in-depth technical training and industry certifications upon successful completion of examinations and demonstration of ability. As a Co-op, you will get the chance to perform a variety of testing on construction materials such as soils, concrete, masonry, and asphalt. Onsite materials testing is conducted on various commercial and transportation construction projects, where you will also work with project managers and other technicians to ensure specifications are followed.\n\nCandidates should be comfortable working outdoors in varying weather conditions and be able to lift 75+ pounds. Co-ops will frequently be required to reach with hands and arms, climb or balance, and stoop, kneel, crouch or crawl. At times, this position may be working at or on uneven terrain, varying heights, in confined spaces, or supported trenches.\n\nWhat's In It For You:\n- Training throughout the program includes comprehensive construction safety, nuclear density gauge, American Concrete Institute (ACI) Field Technician I, and materials laboratory training.\n- Hands-on application of classroom knowledge and theories to real construction situations, including the means and method of construction and working towards resolution of issues arising during construction.\n- Mentoring from a licensed engineer and practical engineering applications.\n- Learning procedures and gaining exposure to ASTM, AASHTO, ACI, ICC, and DOT standards.\n- Add to your professional resume with experience and refere iency in organization and presentation of documentation \n \n\n **Compensation \n \n** The approximate compensation range for this position is $20 - $25 per hour. This compensation range is a good faith estimate for the position at the time of posting. Actual compensation is dependent upon factors such as education, qualifications, experience, skillset, and physical work location. \n \n **About Us \n \n** Michael Baker International, a leading provider of engineering and consulting services, including design, planning, architectural, environmental, construction and program management, has been solving some of the world’s most complex infrastructure challenges for more than 85 years with a legacy of expertise, experience, innovation and integrity. \n \nBased in Pittsburgh and with over 100 offices nationwide, we partner with clients on everything from roads, bridges, tunnels, mass transit, and airports, to water treatment plants, arctic oil pipelines, environmental restoration and specialized overseas construction. We serve as a trusted adviser to the communities we serve, making them safer, more accessible, more sustainable and more prosperous. \n \nWe provide visionary leadership in facilitating transformational change for our clients. Our work delivers differentiating innovations and dedicated experts who challenge the status quo and share a world of diverse experience and an impassioned entrepreneurial spirit. We deliver quality of life. \n \nWe Make a Difference. \n \nMichael Baker International is proud to be an Equal Opportunity Employer. Michael Baker International provides equal employment opportunity for all persons, in all facets of employment. Michael Baker International maintains a drug-free workplace and performs pre-employment substance abuse testing and background checks. We encourage all qualified applicants to apply for any open position for which they feel they are qualified and all will receive consideration for employment without regard to race,
