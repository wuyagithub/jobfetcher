cations. Who Should Apply: This role is a great fit if you: Are pursuing a Bachelor's degree in Civil Engineering. Have a 0 GPA or higher. Have earned (or are working toward) EI certification (preferred, not required). Have strong written and verbal communication skills. What We Offer: Training, support and learning opportunities. Variety of projects across several civil engineering disciplines. Medical insurance if working 20 or more hours per week. Paid Sick Leave. A nationally recognized 401(k) retirement savings plan with a great company match. Inspiring company culture and team environment. Innovative clients who rank among our region's most successful public and private sector leaders. Award-Winning Workplace - Recognized as a Top Workplace and ENR Top 500 Firm since 1998. Technologies We Use and Teach: Autodesk Civil 3D, Innovyze Infowater, Bentley WaterGEMS, SewerGEMS, Bluebeam Revu, ESRI ArcMap, Microsoft Office. Additional Information: Housing and Relocation are not available for this position. Sponsorship is not available for this position. Travel is not required for this position."}, {"job_title": "Internship: Land Development Civil Engineering", "company_name": "Civilitude Engineers & Planners", "city": "Austin", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-04T00:00:00", "description_text": "About Civilitude: At Civilitude LLC, we are innovators in land development and infrastructure, committed to delivering outstanding technical solutions with efficiency and precision. Our journey began with a dedication to meeting tight deadlines, a principle that remains central to our operations. Over time, we have expanded from focusing on K-12 schools and affordable housing to managing a diverse portfolio of public and private projects, driven by a relentless pursuit of excellence and sustainable growth. Position Overview: As a Civil Engineering Intern, you will work closely with our team of engineers and planners to support various land development projects. This internship will provide you with exposure to the civil engineering field, hands-on training in design software, and an understanding of project workflows. You will assist with project planning, civil design, and document preparation, gaining invaluable experience in the land development industry. How Our Internship Works: One posting, all year. We do not create separate seasonal listings. Apply once and note the terms you can work. Flexible timing. Start dates are flexible. If we are a mutual fit, we may extend your internship into the next term or continue during the school year. What to include: In your application, share your availability window, preferred weekly hours, and whether you can continue into a future term. What You Will Do: Assist with civil engineering design tasks such as grading, drainage, stormwater management, and site layout under the supervision of senior engineers. Support the preparation of engineering plans, specifications, and reports to meet project requirements. Collaborate with multidisciplinary teams including architects, planners, and other engineers to contribute to successful project delivery. Conduct research and gather data for engineering studies, hydrologic and hydraulic calculations, and other project tasks. Assist in preparing documents for project submittals and permitting processes. Learn to use AutoCAD, Civil 3D, and other engineering software tools for drafting and design. Attend project and team meetings to observe and learn about client communication and project management. Engage in learning opportunities within the firm to stay current with techniques and industry standards. What You Bring: Currently pursuing a Bachelor's degree in Civil Engineering or a related field. Basic knowledge of engineering principles and an interest in land development. Familiarity with AutoCAD or Civil 3D is a plus, not a requirement. Strong problem-solving skills and attention to detail. Clear communication and a collaborative mindset. Eagerness to learn and take on new challenges. Logistics: Schedule: Flexible hours depending on workload and interest. Location: On-site with reasonable flexibility; details discussed during interviews. Work authorization: Candidates must be legally authorized to work in the United States."}, {"job_title": "Traffic Planning - Civil Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "Phoenix", "state": "AZ", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-03-04T00:00:00", "description_text": "Overview: We are seeking a highly-motivated intern to join our Traffic Planning Discipline for Summer 2026 in our Phoenix, AZ office. Colliers Engineering & Design, an affiliate of Colliers, is a trusted provider of multi-discipline engineering, design and consulting services to public and private sector clients. Headquartered in Holmdel, New Jersey with 80+ offices throughout the United States, we specialize in providing a comprehensive suite of services including Civil/Site, Transportation, Buildings, Geospatial/Survey, Infrastructure, Governmental, Geotechnical/Environmental, Telecommunications and Utilities Engineering, Project Management, & Architecture. We employ over 3,000 talented professionals who utilize the most advanced technologies to deliver customized solutions for our clients. Responsibilities: Assist technical staff with day-to-day design tasks for various types of transportation and traffic projects. Traffic analysis responsibilities including data collection, crash analysis, and intersection & roadway capacity analysis utilizing various software, under the supervision of junior and senior level engineers. Traffic reporting duties including preparation of traffic impact studies as assigned by your management team. CAD work for co inal check. Responsible for adherence to all applicable codes. Requirements: Strong desire for a career working as a Civil Design Engineer. Computer experience with Microsoft Word, Excel, and Outlook. Excellent verbal, written, and interpersonal skills. Strong sense of urgency and self-initiative to meet client deadlines. Detail-oriented team player. Valid drivers license. Familiarity with MicroStation and/or AutoCAD platforms. Benefits: Medical Plan, Vision Plan, Dental Plan, Group Life Insurance, Short Term Disability, Long Term Disability, Voluntary Term Life Insurance, Liberty Mutual Insurance, Personal Time Off (PTO), Paid Holidays, 401(K) Retirement Plan, Section 125 Flexible Benefits Plan, Tuition Reimbursement, Employee Referral Bonus."}, {"job_title": "Civil Engineering Intern - Summer 2026", "company_name": "WSP in the U.S.", "city": "Syracuse", "state": "NY", "employment_type": "INTERNSHIP", "salary_currency": "USD", "salary_min": 19.13, "salary_max": 30.0, "salary_interval": "HOUR", "posted_date": "2026-03-04T00:00:00", "description_text": "WSP USA - Civil Engineering Intern - Summer 2026 (Syracuse, NY)\n\nJob DescriptionWSP Is seeking a Full Time Civil Engineering Intern Summer 2026 to work out of our Syracuse, NY office. This temporary position is seeking individuals currently enrolled in an Undergraduate or Graduate degree program.This Opportunity WSP USA hosts hundreds of internships across the United States to gain hands-on, meaningful work experience to enhance their education and professional aptitude. Our interns gain exposure to real projects while working side by side with senior staff. Through our Developing Professionals Network, interns gain mentorship, networking opportunities and lifelong career connections.This internship is anticipated to take place during the Summer 2026 semester.The program is anticipated to take place from May 18, 2026 through August 7, 2026. The individual start date is flexible.Your Impact Support a variety of engin heduled to take the FE/EIT exam will be strongly considered for this positionFamiliarity with design, drafting, or engineering software such as MATHCAD, SOLIDWORKS, AUTOCAD, etc. as well as Microsoft Excel is beneficial.WSP BenefitsWSP provides a comprehensive suite of benefits focused on a providing health and financial stability throughout the employee's career. These benefits include coverage related to medical, dental, vision, disability, and life; retirement savings; paid sick leave; paid vacation (or other personal time); paid parental leave; and paid time off for purposes of bereavement, voting, and/or attendance at naturalization proceedings.CompensationExpected Salary (all locations): $19.13-$30.00 Per hourWSP USA is providing the compensation range that the company in good faith believes it might pay and offer for this position, based on the successful applicant's education, experience, knowledge, skills, abilities in addition to internal equity and specific geographic location. WSP USA reserves the right to ultimately pay more or less than the posted range and offer additional benefits and other compensation, depending on circumstances not related to an applicant's sex or other status protected by local, state, and/or federal law.About WSP ABOUT US WSP USA is the U.S. operating company of WSP, one of the world's leading engineering and professional services firms. Dedicated to serving local communities, we are engineers, planners, technical experts, strategic advisors and construction management professionals. WSP USA designs lasting solutions in the buildings, transportation, energy, water and environment markets. With more than 15,000 employees in over 300 offices across the U.S., we partner with our clients to help communities prosper.www.wsp.comWSP provides a flexible and agile workplace model while meeting client needs. Employees are also afforded a comprehensive suite of benefits including medical, dental, vision, disability, life, and retirement savings focused on providing health and financial stability throughout the employee's career.At WSP, we want to give our employees the challenges they seek to grow their careers and knowledge base. Your daily contributions to your team will be essential in meeting client objectives, goals and challenges. Are you ready to get started?WSP USA (and all of its U.S. companies) is an Equal Opportunity Employer Race/Age/Color/Religion/Sex/Sexual Orientation/Gender Identity/National Origin/Disability or Protected Veteran Status.The selected candidate must be authorized to work in the United States.Notice To Third Party AgenciesWSP does not accept unsolicited resumes from recruiters, employment agencies, or other staffing services. Unsolicited resumes include any resume or hiring document sent to WSP in the absence of a signed Service Agreement where WSP has expressly requested recruitment/staffing services specific to the position at hand. Any unsolicited resumes, including those submitted to hiring managers or other business leaders, will become the property of WSP and WSP will have the right to hire that candidate without reservation – no fee or other compensation will be owed or paid to the recruiter, employment agency, or other staffing service."}, {"job_title": "Civil Engineering Intern (Solid Waste) - Summer 2026", "company_name": "Civil & Environmental Consultants, Inc.", "city": "Coraopolis", "state": "PA", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-02-25T00:00:00", "description_text": "As a Civil Engineering Intern for Civil & Environmental Consultants, Inc. (CEC) in the Waste Management Practice at our Pittsburgh, PA office, you'll support in-office and field activities primarily associated with solid waste landfill and transfer station facilities. In-office activities include engineering tasks such as tabulating laboratory and field test data, compilation of technical reports, stormwater management system design, and landfill gas collection system design. Field activities include Construction Quality Assurance (CQA) tasks such as monitoring and documenting landfill cell, cap, and gas collection system construction, and use of equipment for monitoring landfill emissions. You will interact and communicate with CEC office and field staff, clients, and contractors. Through the CEC Internship Program, you will: Acquire practical experience applying knowledge from college courses, learn from industry experts, and collaborate with teams across functional groups and locations; Develop a robust professional network through social events and interactive activities; Collaborate closely with a mentor in your discipline to tackle real-world challenges; and Participate in workshops to help foster interpersonal skills within the workplace and prepare students for success in their full-time careers. Current enrollment in an undergraduate Civil or Environmental Engineering program; AutoCAD experience preferred; Prior internship and/or design experience a plus; Local candidates preferred. Applicants must be legally authorized to work for Civil & Environmental Consultants, Inc. (CEC) in the U.S. without sponsorship. CEC offers a matching 401(k); profit sharing; a performance bonus; company stock; medical, dental, and vision insurance; short and long-term disability; tuition assistance; professional development; and work-life balance. CEC is an equal opportunity and affirmative action employer."}, {"job_title": "CIVIL ENGINEERING INTERN", "company_name": "MHS Planning & Design", "city": "Tyler", "state": "TX", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-02-25T00:00:00", "description_text": "Do you have a passion for outdoor recreation, a desire to grow professionally, and a solid work ethic? If so, MHS Planning may be a perfect fit for you. We are e an opportunity to meet technical specialists in the areas of geotechnical engineering, environmental remediation, pavement design, and materials evaluation."}, {"job_title": "Civil Engineering Intern (Summer 2026)", "company_name": "Stantec", "city": "Baltimore", "state": "MD", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-02-25T00:00:00", "description_text": "Stantec - Civil Engineering Intern (Summer 2026)\n\nWe create great places and the connections that get people and goods moving—whether by car, bus, train, plane, or their own two feet. Working within the context of the communities we serve, we provide planning, engineering, and infrastructure management services that fit the needs of our clients and improve the overall transportation experience. Join our team and help us keep communities connected.\n\nLearning begins in the classroom but there's no better place to gain real-world experience than with Stantec. Interns are an integral part of our teams, working to solve some of the world's most complex challenges.\n\nYour Opportunity\nAs an Intern, you will work in a team environment and have exposure to transportation projects which may include highway and bridges and infrastructure, traffic planning and analysis, and/or airport infrastructure and development. Candidates should be highly motivated and dependable students who are taking or have taken civil engineering, structural or transportation related courses. This is a terrific opportunity for a college student to support a number of exciting local and national projects.\n\nYour Key Responsibilities\n- Assist engineers in the preparation of contract documents and reports for a variety of civil and structural engineering projects ranging from highways and interchanges to bridges and toll plazas.\n- Responsibilities include computer aided design and drafting, checking drawings and calculations, quantity take-offs, simple structural calculations, and field inspection.\n\nYour Capabilities and Credentials\nMinimum requirements include some exposure to CAD Design programs and current good academic standing in accredited engineering school.\n\nEducation and Experience\nMust be currently enrolled in an accredited bachelor's or master's degree in Civil, Structural, or similar Engineering Program.\n\nTypical office environment working with computers and remaining sedentary for long periods of time. Field work may include exposure to the elements including inclement weather.\n\nPay Transparency: In compliance with pay transparency laws, pay ranges are provided for positions in locations where required. Actual compensation for part-time roles will be pro-rated based on the agreed number of working hours per week.\n\nBenefits Summary: Regular full-time and part-time employees have access to medical, dental, and vision plans, a wellness program, health saving accounts, flexible spending accounts, 401(k) plan, employee stock purchase program, life and accidental death & dismemberment (AD&D) insurance, short-term/long-term disability plans, emergency travel benefits, tuition reimbursement, professional membership fee coverage and paid family leave. Regular full-time and part-time employees will receive ten paid holidays in each calendar year. In addition, employees will be eligible to accrue vacation between 10 and 20 days per year and eligible for paid sick leave.\n\nPrimary Location: United States | MD | Laurel\nEmployment Status: Regular"}, {"job_title": "Civil Engineering Intern (Summer 2026)", "company_name": "Stantec", "city": "Laurel", "state": "MD", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "2026-02-25T00:00:00", "description_text": "Stantec is seeking Civil Engineering Interns for Summer 2026 to work in a team environment on transportation projects including highway and bridges, i t in fieldwork and applied engineering problem-solving\n * Strong writing, communication, and organizational skills\n * Familiarity with AutoCAD and Microsoft Excel preferred\n * Ability to work independently and as part of a team\n * Valid driver's license and clean driving record\n * Ability to work outdoors in varying weather conditions as needed \n \n\n **Why Join Broadbent \n \n**\n * Gain hands-on experience on real projects\n * Work with experienced engineers and technical professionals\n * Build skills in environmental and civil consulting\n * Growth toward PE licensure\n * Join a collaborative team with opportunities for professional development \n \n\n **Benefits \n \n** We also offer a comprehensive benefits package, including a bonus program, 100% health insurance premium coverage for employees and dependents, dental, vision, a health savings account (HSA) with employer contributions up to 50% of plan deductible, a generous 401(k) retirement plan with safe harbor contribution and company match, vacation, sick leave, ability to earn additional paid time off, and disability and life insurance. \n \n **Ready to join our team? \n \n** We understand your time is valuable and that is why we have a very quick and easy application process. If you feel that you would be right for this position, please fill out our initial 3-minute, mobile-friendly application. \n \nBroadbent is an Equal Opportunity/Affirmative Action employer committed to diversity in the workplace. All qualified applicants will receive consideration for employment without regard to race, color, religion, sex, sexual orientation, age, national origin, disability, protected veteran status, gender identity or any other factor protected by applicable federal, state, or local laws. \n \n _Job Posted by ApplicantPro_\nShow more Show less \n * ### Seniority level \nEntry level \n * ### Employment type \nFull-time \n * ### Job function \nEngineering and Information Technology \n * ### Industries \nEnvir ookie Policy](https://www.linkedin.com/legal/cookie-policy?trk=linkedin-tc_auth-button_cookie-policy). \n[ ](https://www.linkedin.com/company/centralsan?trk=public_jobs_topcard_logo)\n# STUDENT INTERNS - ENGINEERING\n#### \n[ Central Contra Costa Sanitary District ](https://www.linkedin.com/company/centralsan?trk=public_jobs_topcard-org-name) Martinez, CA \n5 days ago Be among the first 25 applicants \n[\nSee who Central Contra Costa Sanitary District has hired for this role \n](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D7039349%26title%3DStudent%2BIntern&emailAddress=&fromSignIn=&trk=public_jobs_see-who-was-hired_people-search-link_face-pile-cta)\nApply \n## Join or sign in to find your next job \nJoin to apply for the **STUDENT INTERNS - ENGINEERING** role at **Central Contra Costa Sanitary District**\n`` `` `` `` `` ``\nEmail or phone \nPassword \nShow\n[Forgot password?](https://www.linkedin.com/uas/request-password-reset?trk=csm-v2_forgot_password) Sign in \nSign in with Email\nor \nNew to LinkedIn? [Join now](https://www.linkedin.com/signup/cold-join?source=jobs_registration&trk=public_jobs_apply-link-offsite_contextual-sign-in-modal_join-link)\nBy clicking Continue to join or sign in, you agree to LinkedIn’s [User Agreement](https://www.linkedin.com/legal/user-agreement?trk=linkedin-tc_auth-button_user-agreement), [Privacy Policy](https://www.linkedin.com/legal/privacy-policy?trk=linkedin-tc_auth-button_privacy-policy), and [Cookie Policy](https://www.linkedin.com/legal/cookie-policy?trk=linkedin-tc_auth-button_cookie-policy). \n[ Save ](https://www.linkedin.com/login?emailAddress=&fromSignIn=&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2Fstudent-interns-engineering-at-central-contra-costa-sanitary-district-4387543772&trk=public_jobs)\n * [ Report this job ](https://www.linkedin.com/uas/login?fromSignIn=true&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2Fstudent-interns-engineering-at-central-contra-costa-sanitary-district-4387543772&trk=public_jobs_ellipsis-menu-semaphore-sign-in-redirect&guestReportContentType=JOB&_f=guest-reporting)\n\nTHE POSITION \n \n **SIX MONTH INTERNSHIPS \n \n** **$40.00 per hour \n \n** Central San is an award-winning special district of the State of California that provides wastewater collection, treatment, and disposal services; recycled water production and distribution; and household hazardous waste collection.Our internships are six-month commitments, typically beginning in January and July. Interns are expected to work on-site in Martinez, California, for 40 hours per week, Monday through Friday. To be eligible, candidates must be an enrolled college junior (60 or more semester units), senior, graduate student, or have graduated within the past 12 months; must possess a valid California driver's license and a satisfactory driving record; and must be eligible to work in the United States. \n \n **Environmental and Regulatory Compliance Division (1 position) \n \n** Laboratory Assistant \n \nThis position will be assigned to perform chemical, physical, biological, and microbiological analyses of wastewater and its byproducts. Duties include assisting staff with projects, sample collection and analysis, and operating simple laboratory instruments and associated computers. Duties may require research and assistance with project management and development. This position may also perform literature searches, compile scientific data, perform data analysis and reduction, and write reports and presentations. **Preferred qualifications:** Prior lab experience and pursuing a degree in chemistry, biochemistry, biology, microbiology, or engineering. \n \n **Resource Recovery and Development Services Division (1 position) \n \n** Development Services \n \nThis position will assist with various tasks associated with the design, permitting, and construction of sewers for new and infill land development. Typical work includes assisting the permit counter with administrative duties, processing of sewer service applications, and reviewing engineering plans submitted by developers, contractors, and/or consultants for conformance with Central San’s standards and ordinances. Other duties include interacting with contractors and the public at both the Permit counter and in the field for construction projects; assisting the construction inspection group to ensure contractual compliance with plans, specifications, codes, and safety requirements, including checking cut sheets for line and grade; and verifying that materials being incorporated into a project are per specification. Applicants should be able to communicate effectively; learn to use industry-specific software; perform project-specific tasks; write clear, concise reports; assist personnel with fieldwork; work independently; and be self-motivated, patient, and respectful. **Preferred qualifications:** Pursuing a degree in environmental, civil, chemical, mechanical, or related engineering majors, and knowledge of computer spreadsheet development, word processing, and basic physics and chemistry. \n \n **Planning and Optimization Division (4 positions) \n \n** Innovations and Efficiency \n \nThis position will assist with nutrient removal, odor control, secondary clarifier, and treatment plant preliminary design and planning projects. Typical work includes engineering support for data collection, reviewing past project drawings and technical reports, conducting literature reviews, developing presentations, and performing data analysis. Candidates should have knowledge of spreadsheet development, word processing, and fundamental physics and chemistry; be able to organize work assignments and learn to use industry-specific software; design and perform project-specific tasks; write clear, concise reports; assist personnel with fieldwork; work independently; and be self-motivated, patient, and respectful. **Preferred qualifications:** Pursuing a degree in environmental, civil, chemical, or mechanical engineering. \n \nAsset Management and Geographic Information System (GIS) \n \nThis position will assist with GIS and asset management projects. Duties may include editing and maintaining GIS datasets, reading and extracting data from record drawings, performing field work, creating and updating various maps, publishing map services, and supporting the asset management system. Candidates should have completed or be enrolled in a GIS class, or have experience with Esri ArcMap and/or ArcGIS Pro. An interest in GIS and/or majoring in GIS, geography, or geospatial science is preferred. \n \nPlanning \n \nThis position will assist with planning projects for the treatment plant and collection system. Typical work includes engineering assistance with technical and economic evaluations, assessment of wet weather resiliency initiatives, cost estimating, writing technical memoranda, reviewing past technical reports and literature, developing presentations in Microsoft PowerPoint, data management and analysis using Microsoft Excel, and providing day-to-day project support. Applicants should be able to organize work assignments; learn to use industry-specific software; design and perform project-specific tasks; write clear, concise reports; assist personnel with fieldwork; work independently; and be self-motivated, patient, and respectful. **Preferred qualifications:** Pursuing a degree in environmental, civil, chemical, mechanical, or related engineering majors, and knowledge of computer spreadsheet development, word processing, and basic physics and chemistry. \n \nRecycled Water \n \nThis position will assist with Central San's commercial, residential, and recycled water distribution programs, including planning and evaluating recycled water projects. Typical work includes routine customer interaction; assisting with the operation and maintenance of the recycled water distribution system; providing engineering support; interdepartmental coordination; report writing; literature review; internet research; recycled water usage tracking and billing; regulatory tracking; and assisting with the development of program guidelines, documents, and manuals. Applicants may work on tasks or assignments related to collection system or treatment plant projects as needed. Candidates should be able to organize work assignments; learn to use industry-specific software; design and perform project-specific tasks; write clear, concise reports; assist personnel with fieldwork; work independently; and be self-motivated, patient, and respectful. **Preferred qualifications:** Pursuing a degree in environmental, civil, chemical, mechanical, or related engineering majors, and knowledge of computer spreadsheet development, word processing, and fundamental physics and chemistry. \n \n **Capital Projects Division (3 positions) \n \n** Collection System Program \n \nThis position seeks environmental, civil, mechanical, or related engineering majors to assist with collection system design and construction projects. This position will work with engineering and survey staff to replace and improve critical infrastructure in surrounding cities, using open-cut installation and trenchless technologies such as cured-in-place lining, pipe bursting, and horizontal directional drilling. Typical work includes determining and verifying field conditions; performing engineering calculations and data analysis; conducting field surveys; researching equipment and construction methods; preparing design details for project drawings; and assisting design and construction management teams. Projects currently under design and construction involve the replacement and rehabilitation of sewer pipelines, maintenance access hole structures, and various improvements in the collection system and pumping stations. \n \nTreatment Plant Program \n \nThis position seeks environmental, civil, chemical, mechanical, or related engineering majors to assist the Capital Projects Treatment Plant Group in treatment plant design and construction projects. This position will work with engineering and treatment plant operations staff to replace and improve critical infrastructure in an active wastewater treatment plant. Typical work includes determining and verifying field conditions; performing engineering calculations and data analysis; conducting field surveys; researching equipment and construction methods; preparing design details for project drawings; and assisting design and construction management teams. Projects currently underway include process, structural, and mechanical system rehabilitation; solids handling facilities planning and design; equipment and piping rehabilitation; energy management; recycled water; safety enhancements; electrical instrumentation and controls upgrades; fire and security alarm systems; and similar projects. \n \nSELECTION PROCEDURE \n \n **Interested students can** **click here to apply.** **Applicants must attach a cover letter, resume, and unofficial/unlocked copy of transcript(s) to their application to be considered for the program. \n \n** Questions about our internship program or the application process can be directed to intern@centralsan.org. \n \nTemporary employees are not eligible for District benefits. Five days of California state mandated sick leave will be provided annually. \nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nTemporary \n * ### Job function \nEducation and Training \n * ### Industries \nUtilities \n\nReferrals increase your chances of interviewing at Central Contra Costa Sanitary District by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D7039349&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Student I irect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2Fengineering-intern-%25E2%2580%2593-summer-position-at-city-of-elkhart-indiana-4377536842%3Fposition%3D23%26pageNum%3D0%26refId%3DL15VxMG8eQHcS6onQldMFA%253D%253D%26trackingId%3DIMRwZTiRYkkOWCV6T76GKg%253D%253D&trk=public_jobs_job-alert-guest-redirect-cta)\n`` `` ``\n##"}, {"job_title": "Civil/Site Engineering Intern", "company_name": "Colliers Engineering & Design", "city": "美国 宾夕法尼亚州 匹兹堡\n1 周前", "state": "", "employment_type": "FULL_TIME", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "", "description_text": "Overview \n \n** Colliers Engineering & Design is looking for a Civil/Site Engineering Intern to join our team in the Pittsburgh, PA office for Summer 2026! \n \nOur team of Civil/Site professionals regard you as a strategic partner. Whether facilitating a large retail complex, residential development or planning a small stand-alone establishment in a downtown business district, we embrace your vision while guiding you through the development process. Our expertise in implementing proven strategies and experience with the regulatory process eliminates costly delays that ensure your vision unfolds seamlessly. Our partnership includes the advantage of having our comprehensive suite of in-house services at your disposal, which keeps your design time-line on track. \n \n **Responsibilities \n \n**\n * Our interns will assist technical staff on day-to-day projects in their respective disciplines.\n * Preparing site plans under direction of junior engineers.\n * Code reviews.\n * Code requirements from municipalities.\n * SWPPP inspections (will be trained on this by team).\n * Erosion inspections on-site.\n * CED internships are unique in that they are work-centered, meaning you are working on real, billable client work right away.\n * This is a great way to gain real life experience in consulting.\n * In addition to the work-centered program, we also offer robust internship programming, which includes opportunities to work with other interns, learn about other areas of the business, and develop valuable communication skills and networking connections. \n \n\n **Qualifications \n \n**\n * Actively pursuing a Master's or Bachelor's degree in Civil Engineering, Environmental Engineering, or a related field.\n * Hydrology type work or coursework and Hydraulics coursework.\n * All applicants should be eligible to work in the US and attend a university or college physically located in the United States.\n * Be highly motivated, able to work in a fast paced environment, and have great communication skills.\n * AutoCAD experience preferred.\n * Civil 3D experience preferred.\n * HydroCAD experience a plus.\n * Site/Civil interest specifically Land Development.\n * Students with some prior internship experience are preferred, but any candidates who apply will be reviewed and considered for different roles.\n * Ability to read, write, and understand English for purposes of comprehending written job-related communications and verbal instructions and interactions. \n \n\n **What We Offer \n \n** At Colliers Engineering & Design, our people are our most important resource. That’s why we are committed to providing all our employees with a safe, comfortable work environment, potential for career advancement, and the ability to impact society through their projects as well as Company sponsored activities. \n \nOur interns are given opportunities to learn in a variety of settings. Multidisciplinary engineering, surveying, and architectural design projects provide interns an opportunity to see the work in real-life settings, working side by side with other professionals in their chosen field. They are also able to participate in educational opportunities that build a variety of transferable skills valuable in every career. Our Career Exploration Series provides interns with chances to network and learn from the professionals doing the work and growing our business. Interns also complete a series of reflections, problem solving activities, contests, drawings, and create end of summer presentations which help showcase their learning and experiences. Additional networking and trainings specific to the students' areas of study are also made available to students throughout the Summer Internship program. \n \nOur internship program is designed to help grow our organization organically with talented individuals starting their careers all over the country. On average, we make full-time, permanent offers to students approaching graduation within a year more than 50% of the time. We want great talent to start their careers here stay with CED and its affiliates for their entire career! \n \nWe have created an internal culture that provides the resources and technology needed to encourage personal and professional growth opportunities through reimbursement for education; a free in-house resource for hundreds of educational and self-enrichment courses; mentorship program; wellness program; Women’s Organization and ongoing philanthropic opportunities. We make as many of these opportunities available to our interns, as well as our regular employees as possible. \n \nApply today to learn how you can join our team of professionals, so we can help you **_Accelerate Your Success_**! \nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nInternship \n * ### Job function \nEngineering and Information Technology \n * ### Industries \nProfessional Services \n\nReferrals increase your chances of interviewing at Colliers Engineering & Design by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D71630305&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Site Engineer jobs in **Pittsburgh, PA**. \n[ Sign in to create job alert ](https://www. hnical, and project employees serve our clients from offices across the world. Ranked by ENR as one of the top environmental engineering design firms, Geosyntec is internationally known for its technical leadership, broad experience, partnerships with academic research institutions, and exceptional client service. Our Arizona-based teams are particularly noted for their extensive collaboration with engineers and scientists across North America to address complex emerging and legacy environmental impacts, including the expanding field of PFAS remediation. \n \nWe invest in our people. Each employee is unique, and your career at Geosyntec will be too. We offercompetitive pay and benefits, and well-being programsto support you and your family. \n \nTo Learn More Visit: http://www.geosyntec.com/careers/ . \n \n **Essential Duties And Responsibilities \n \n**\n * Fieldwork such as soil and groundwater sampling, stormwater inspections, remediation system operation and monitoring, drilling, and contractor oversight. \n * Data input and analysis, including preparing maps, tables, and figures; \n * Assist with engineering calculations using computer-based technical tools; \n * Technical writing of reports, letters, memoranda, plans, specifications, and proposals; \n * Follow instructions and interact with engineers, geologists, scientists (modelers, chemists, biologists), GIS and CADD professionals, office administrative staff, contractors and construction personnel; and \n * Local travel or driving to project sites as needed. \n \n\n**Education and Licensure \n \n**\n * Currently registered in a Bachelor’s or Master’s university degree program in a relevant discipline. (required) \n * Degree focus area in environmental, civil, geotechnical, chemical, or water resources engineering preferred. \n * Highly qualified candidates in geology, natural sciences, or chemistry programs will be considered. \n \n\n**Skills, Experience And Qualifications \n \n**\n * Experience with Microsoft Excel (required), Python, hydrological models (e.g., MODFLOW), GIS (e.g., ArcView), CADD (e.g., AutoCAD), and/or other software relevant to the field. (preferred) \n * Previous experience (academic or work-related) performing outdoor fieldwork (e.g., collecting samples and measurements, surveying, and/or light physical labor) in Arizona or similar climates. (preferred) \n * Outstanding academic credentials and exceptional interpersonal, technical writing, oral and written communication and problem-solving skills. (required) \n * Valid U.S. driver’s license and a satisfactory driving record for business travel to project sites. (required) \n * Reliable personal transportation.\n\nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nInternship \n * ### Job function \nScience, Consulting, and Engineering \n * ### Industries \nCivil Engineering, Environmental Services, and Construction \n\nReferrals increase your chances of interviewing at Geosyntec Consultants by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D21488&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Chemical Engineering Intern jobs in **Phoenix, AZ**. \n[ Sign in to create job alert ](https://www.linkedin.com/login?emailAddress=&fromSignIn=&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2F4376434194%2F%3Ftrk%3Dflagship3_search_srp_jobs&trk=public_jobs_job-alert-guest-redirect-cta)\n`` `` ``\n##"}, {"job_title": "Civil, Construction and Environmental Engineering - Resilience Engineering - Assistant Professo...", "company_name": "Inside Higher Ed", "city": "", "state": "", "employment_type": "INTERNSHIP", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "", "description_text": "Skip to main content [ LinkedIn ](https://www.linkedin.com/?trk=public_jo a (UA) invite applications for an Assistant Professor position in the research area of Resilience Engineering (including focus areas in geotechnical and construction). \n \n **Detailed Position Information \n \n** The Department of Civil, Construction and Environmental Engineering (CCEE: https://cce.eng.ua.edu/) and the Lee J. Styslinger Jr. College of Engineering (SCoE: https://eng.ua.edu/) at The University of Alabama (UA: https://ua.edu/) invite applications for multiple tenure-track and tenured faculty positions at all ranks, including Assistant, Associate, and Full Professor levels, within the CCEE department. \n \nThis posting is specific for candidates applying for a position at the rank of tenure-track Assistant Professor in the research area of Resilience Engineering. Applications from candidates with appropriate experience and a strong record of scholarly productivity and impact within other research areas who would seek appointment at the rank of Associate or Full Professor should apply through related postings advertised at those other position/rank levels. \n \nTowards achieving excellence in all our efforts, the CCEE department and the Styslinger College of Engineering seek to hire faculty that can contribute to both: (1) build upon existing strengths in the Department, College, and University and (2) expand the scope of research within the department, College, and UA as a whole. \n \nThe CCEE Department is seeking candidates in the research area of Resilience Engineering (including focus areas in geotechnical and construction). Candidates should be focused on advancing sustainable, adaptable and resilient infrastructure systems through geotechnical/geoengineering or construction engineering/management. Demonstrated expertise in areas such as: creating innovative solutions that enhance the resilience of the built and natural environment; novel processes, materials and technologies to reduce embodied and operational carbon in infrastructure; sustainable approaches to mitigate hazards and improve resilience; digital transformation and data-driven methods, including sensing technologies, cyber-physical systems, and real-time health monitoring of infrastructure and geo-systems; geotechnical hazard mitigation including soil-structure interaction, slope stability, ground improvement, and seismic/climate resilience; and integration of safety and risk management in construction and geotechnical systems under extreme conditions. \n \nThe CCEE department offers ABET/EAC accredited B.S. degrees in Architectural Engineering, Civil Engineering, Construction Engineering, and Environmental Engineering. The department offers six minors in the areas of Architectural, Civil, Construction, Environmental and Water Resources, Transportation, and Structural Engineering. The undergraduate programs have a sustained enrollment of nearly 800 students. At the graduate level, the CCEE department also has active MS and PhD programs in Civil Engineering and MS program in Environmental Engineering, with a total sustained graduate enrollment of nearly 120 students. \n \nThe Department of Civil, Construction and Environmental Engineering and the Styslinger College of Engineering consider teaching, research, and service as the three critical and complimentary portions of their overall mission. Candidates must demonstrate a clear potential to successfully develop, lead, and extramurally fund a highly productive research group with significant scholarly impact in a focus area with long term potential to further build upon the rapid rise and great success of the department college. An ability to collaborate with existing faculty in the key focus areas both within the CCEE Department and the college, as well as potential colleagues across the campus, is also highly desirable. \n \nThe Lee J. Styslinger Jr. College of Engineering and the Department of Civil, Construction and Environmental Engineering also pride themselves on the outstanding educational experience provided to their students, and thus faculty candidates must demonstrate an ability to develop and teach classes at both the undergraduate and graduate level in the faculty member’s area(s) of expertise as well as to teach courses that support the delivery and accreditation of the Department’s core degree programs. \n \nThe CCEE Department, College, and University are also notable for the collegial, welcoming and supportive spirit built into the fabric of who we are and how we interact across our College family of students, faculty, and staff. It is therefore expected that candidates demonstrate an ability to support this important aspect of our community. \n \nAppointments to the faculty of The University of Alabama are based on the personnel requirements of the University’s academic programs and on the goal of achieving and maintaining excellence in its teaching, research, and service/academic citizenship activities. \n \n **Minimum Qualifications \n \n**\n * Earned Ph.D. in Architectural, Civil, Construction or Environmental Engineering or a closely related discipline from an accredited institution.\n * Demonstrated record of prior research work and a record of impactful scholarly publications in refereed journals, conference proceedings, and similarly impactful venues.\n * Demonstrated interest and/or record in engineering education and professional service in area(s) of specialization.\n * Effective verbal and written communication skills.\n * Show the potential to construct and sustain a quality research program.\n * Exhibit the potential for excellent teaching at both the graduate and undergraduate levels. \n \n\nApplicants must also meet all university criteria for appointment to the rank of Assistant Professor. \n \n **Preferred Qualifications \n \n**\n * Demonstrated a record of high-quality research and scholarly publications that is recognized nationally and/or internationally. \n * A record of scholarship in architectural, civil, construction, or environmental engineering, or a closely related department with both undergraduate and graduate degree programs. \n * Post-doctoral experience or other similar post-graduate experience. \n * Attainment, progress toward or demonstrated interest in professional licensure or other applicable professional certification (FE or PE). \n * Exceptional collegial, interpersonal, and mentoring skills. \n \n\n **Instructions And Required Materials For Application \n \n** Required application documents include a: (1) cover letter that includes both the department name, rank of position, and specialty area for which the candidate is applying, (2) a resume/curriculum vitae, (3) a 4 to 6 page statement of research interests and plans, (4) a one to two page statement of teaching interests and plans, and (5) the names and contact information for at least four references. \n \nReview of applications will begin immediately. Applications are preferred on or before November 16, 2025 to receive fullest consideration, but the search will continue until the positions are filled. A position start date of August 16, 2026 would be typical, but flexibility with respect to start date is possible. Questions about the position can be directed to rbertini@ua.edu. The University of Alabama is an Equal Employment/Equal Educational Opportunity Institution. Candidates from under-represented groups are encouraged to apply. \n \n **About The Lee J. Styslinger Jr. College Of Engineering \n \n** As the premier flagship university for the state of Alabama and as one of the first five universities in the nation to offer engineering instruction, The University of Alabama (UA) has more than 175 years of proud engineering history. The Lee J. Styslinger Jr. College of Engineering (SCoE) is committed to conducting cutting-edge research that advances the frontiers of science and engineering, translating such fundamental advancements and knowledge through applied research and technology commercialization into impactful solutions which improve the human condition and address the challenges facing humankind, and using that immersive research environment to provide unparalleled educational experiences and opportunities for our students at both the undergraduate and graduate levels. We pride ourselves on educating and preparing the next generation of engineering and computer science scholars and professionals who will positively shape the future around us. Through our educational, research, and service activities that support our overall vision to be one of the most impactful engineering programs in the nation, SCoE continues to provide leadership in the many professional disciplines represented by our College and to the community, state, and nation as we advance our professions, the economy, and the lives of all those whom we serve. \n \nThe Lee J. Styslinger Jr. College of Engineering is comprised of seven departments: Aerospace Engineering and Mechanics, Chemical and Biological Engineering, Civil, Construction, and Environmental Engineering, Computer Science, Electrical and Computer Engineering, Mechanical Engineering, and Metallurgical and Materials Engineering. These departments currently deliver 13 different undergraduate and 15 different graduate degree programs. Overall, the College enrolls approximately 6,000 students, making it one of the largest colleges out of the more than 40,000 students on UA’s campus. \n \nWhile the university has been on a constant mission to advance in every aspect of its operations since its inception, UA has in particular seen transformative growth in its research enterprise and impact over the past decade. Through the efforts of The University, UA Office of Research and Economic Development (ORED), the Styslinger College of Engineering and its’ centers, departments, and faculty, UA’s research enterprise has surged dramatically higher in the last five to ten years. This recent and continuing steep growth rate of research has positioned UA as one of the fastest growing research institutions in the nation. More specifically, the Styslinger College of Engineering has seen annual research awards and expenditures grow at an average of more than 25% per year for more than the last 5 years, now surpassing $100 million annually in new research awards. By more than doubling research over the past 5 to 7 years, the size of the graduate programs across the College has doubled as well. The continued ambitious growth of research programs amongst our existing faculty and research centers combined with the recent significant additions of a large number of new tenure-track and tenured faculty, particularly the addition of more than 60 such new highly research active faculty over the past three years, has positioned COE for maintaining this steep trajectory of research growth and impact well into the future. \n \nThe educational activities of the College and its constantly increasing volume of impactful research are enabled and supported by a tremendous combination of amazing faculty and staff, an outstanding array of modern new facilities that are the envy of its peers, and a world-class student body at both the undergraduate and graduate levels. The College currently has more than 185 faculty members, and has as mentioned earlier seen the addition of significant number of new faculty over the past three years with more than 75 new faculty joining the College in that time period and plans to hire an additional 20 to 30 faculty this year as well. In terms of facilities, the Styslinger College of Engineering has one of the largest overall footprints of any college at UA, currently occupying all or significant portions of 17 different facilities across campus. Some of the most recent additions to that space are the state-of-the-art facilities provided for many of the College’s departments in the recently completed Shelby Science and Engineering Quad that was built at a cost approaching $400 million. \n \nIn addition to the traditional engineering departments and their facilities, there are also more than 8 different major research centers housed within the College that span and support a wide-ranging set of research thrust areas. These centers bring together faculty from across the College and the University to capitalize on emerging technological opportunities and to tackle some of the most pressing challenges facing the planet both today and well into the future. In addition to these College research centers, a number of university-level research institutes and centers that also provide support and infrastructure to an array of research thrusts and projects that engage faculty from across the College and University. This synergistic combination of outstanding people, facilities, and resources will continue to fuel SCoE’s advancement and growth in education and research well into the future. \n \nOverall, with its award-winning faculty and staff, outstanding and growing student body, tremendous array of state-of-the-art facilities, diverse offerings of nationally accredited degree programs, and the strong support of its local, state, and national partners, the Lee J. Styslinger Jr. College of Engineering has positioned itself for continued success and rapid advancement as a leader in engineering science, education, and practice. The College is looking for new faculty who want to build or continue their career in a dynamic organization with truly unlimited potential. \n \nIt is indeed an exciting time to join The University of Alabama and the Lee J. Styslinger Jr. College of Engineering. The College has recently embarked on its “Top-30+ by ‘30” initiative which aims to have the College and all of its departments and programs achieve top-30 impact in all dimensions of our operations. Those impacts and dimensions include offering a comprehensive set of innovative degree program covering the full spectrum of engineering and computer science fields, enrolling a number of students and conferring a number of degrees at both the undergraduate and graduate levels to be one of the largest producers of engineering talent in the nation, achieving continued outstanding growth in research awards and expenditures to enable continued expansion of our graduate programs and research activities, continuing to scale scholarly research productivity to be a major force in pushing the frontiers of our disciplines, and to playing an ever more important role in shaping our disciplines and the future of computer science, engineering, and technology through local, national and international service. To achieve those goals, the College, with strong support of the University, is deploying substantial resources in hiring new faculty, developing new facilities including both laboratory and computing resources, and expanding our research and educational programs. These activities present an outstanding opportunity here at The University of Alabama for individuals to fulfill their career objectives and dreams as a faculty member in an environment that can fully support their development as an excellent scholar, researcher, and teacher. \n \n **About The University Of Alabama \n \n** The University of Alabama (also known as the Capstone) is located in Tuscaloosa, Alabama, named one of Travel + Leisure’s 25 Best College Towns and Cities in the U.S. As one of the nation’s premier universities, UA offers bachelor’s, master's and doctoral degrees in nearly 200 fields of study. With more than 1,400 acres of tree-lined academic core campus and over 300 state-of-the art facilities, UA has been ranked among the most beautiful and most impressive college campuses in the South, in the state of Alabama and in the nation. \n \nIn Fall 2023, the Capstone set a new enrollment record with more than 39,000 students, including more than 8,200 in the freshman class. The current enrollment includes students from every county in Alabama, every state in the nation and 92 countries around the world. More than 1,100 National Merit Scholars are currently enrolled, making UA one of the largest enrolling institutions of the scholars in the country. \n \nUA was recently recognized as a Top Producing Institution of Fulbright U.S. students for the seventh time in nine years, as well as a Top Producing Institution of Fulbright U.S. Scholars for the first time. UA is one of only 12 universities in the nation to receive both honors. \n \nFor reasons like this, the University made Forbes list of America’s Top Colleges for 2023 and Time magazine’s list of Top 50 Best Colleges for Future Leaders. It also made Princeton Review’s list of Top Value Colleges. \n \nUA is also designated among the top doctoral research universities in the United States in the Carnegie Classification of Institutions of Higher Education. One of the fastest growing major research institutions in the nation, UA saw a 21% increase in sponsored awards in the 2023 fiscal year. \n \nSince 2015, UA has invested over $1.1 billion in the physical campus, adding more than 2.55 million gross square feet of space, over 150 new research-intensive faculty, signature research areas (e.g., “The Alabama Research Institutes”), and a growing number of partnerships with industry and with state and federal agencies. \n \nThe University employs nearly 2,100 faculty and over 4,500 staff, with 52 UA researchers included in the National Academy of Inventors. An additional 40 current faculty have received the NSF CAREER Award, the nation’s most prestigious recognition of top performing young scientists in disciplines ranging from nanoscience and engineering to biological sciences. \n \n **Background Investigation and EEO Statement \n \n** Background Investigation Statement: Prior to hiring, the final candidate(s) must successfully pass a pre-employment background investigation and information obtained from social media and other internet sources. A prior conviction reported as a result of the background investigati raditional design-bid-build (DBB), we also deliver projects using Design-build and emergency projects that put us in partnership with owners and contractors and multi-disciplinary specialists to deliver projects as cohesive teams. \n \nAcross the Water Practice our team of more than 400 water staff nationally and over 150 in the West Region, Michael Baker International emphasizes a culture of open and transparent communication and collaboration among its \"Wolf Pack\" team members. Part of our mission is to provide an environment where honest and open discussion is encouraged. Consistently ranked nationally by ENR as a Top 20 Water Supply firm, our San Diego team invests in the education of our Early Career Professionals (ECP) by promoting mentorship programs, professional organization involvement, project peer review, and MBI Speak Easy where staff hone their presentation skills. In addition to delivering for our local clients we are committed to our local communities by volunteering our time to organizations such as AMVETS, local food banks and homeless shelters, humane society, to name a few. We build colleague relationships through annual social activities like our softball team, golf tournament, Del Mar Horse Races, outdoor hikes, monthly office lunches, and MLB Padre Game. We also make global social impacts via partnerships with Bridges to Prosperity and Water for People. \n \n **Responsibilities \n \n**\n * You will be involved with a variety of water-related projects such as water and sewer master plans; pipelines, pump stations, reservoirs, tanks, wells, hydraulic structures and water and wastewater treatment facility designs, including membrane process and exchanges. \n * You will work as part of a project team and be responsible for planning, design development, calculations, presentations, and overall project development for a variety of projects.\n * Prepare design calculations, drawings, and specifications for water and wastewater pipelines and pump stations.\n * Conduct technical evaluations to support planning and design related to water and wastewater systems.\n * Prepare and review technical memoranda, reports, drawings, specifications, submittals, and miscellaneous contract documents.\n * Assist technical marketing during the procurement of key projects.\n * Communicate effectively and coordinate with project teams including other disciplines (cost estimators, GIS, designers, and other technical staff in and outside Michael Baker).\n * Coordination with internal and external partners in organizational leadership initiative. \n \n\n**Professional Requirements \n \n**\n * Possess a Bachelor’s degree in Civil/Environmental Engineering with an emphasis on water resources and/or environmental engineering, or related engineering field and a minimum of 5 years’ of experience.\n * Professional Engineer registration in California (P.E.) \n * Be interested in working on a variety of projects supporting the Water and Wastewater Department.\n * Have good technical writing and communication skills.\n * Proficient in AutoCAD, AutoCAD Civil 3D, and / or MicroStation\n * Proficient in Hydraulic Modeling of water distribution and sewer collection systems\n * Proficient with Microsoft Suite including Word, Outlook, Project, Excel, and PowerPoint\n * Experience with GIS, and other engineering software is a plus.\n * History of leadership and active participation in professional or company organizations.\n * Successful junior staff management and development \n \n\n **Compensation \n \n** The approximate compensation range for this position is $90,000 to $120,000 per year. This compensation range is a good faith estimate for the position at the time of posting. Actual compensation is dependent upon factors such as education, qualifications, experience, and skillset. \n \n **Benefits \n \n** We offer a comprehensive benefits package including: \n \n\n * Medical, dental, vision insurance \n * 401K Retirement Plan \n * Health Savings Account (HSA) \n * Flexible Spending Accounts (FSA) \n * Life, AD&D, short-term and long-term disability \n * Professional and personal development \n * Generous paid time off \n * Commuter and wellness benefits \n * Project Manager Bonuses \n \n\n**About Us \n \n** Michael Baker International, a leading provider of engineering and consulting services, including design, planning, architectural, environmental, construction and program management, has been solving some of the world’s most complex infrastructure challenges for more than 85 years with a legacy of expertise, experience, innovation and integrity. \n \nBased in Pittsburgh and with over 100 offices nationwide, we partner with clients on everything from roads, bridges, tunnels, mass transit, and airports, to water treatment plants, arctic oil pipelines, environmental restoration and specialized overseas construction. We serve as a trusted adviser to the communities we serve, making them safer, more accessible, more sustainable and more prosperous. \n \nWe provide visionary leadership in facilitating transformational change for our clients. Our work delivers differentiating innovations and dedicated experts who challenge the status quo and share a world of diverse experience and an impassioned entrepreneurial spirit. We deliver quality of life. \n \nWe Make a Difference. \n \nMichael Baker International is proud to be an Equal Opportunity Employer. Michael Baker International provides equal employment opportunity for all persons, in all facets of employment. Michael Baker International maintains a drug-free workplace and performs pre-employment substance abuse testing and background checks. We encourage all qualified applicants to apply for any open position for which they feel they are qualified and all will receive consideration for employment without regard to race, color, religion, creed, age, gender, sexual orientation, gender identity, national origin, citizenship status, marital status, familial status, pregnancy or childbirth, genetic information, disability, protected veteran status, status with regard to public assistance, or membership or activity in a local human rights commission, or any other legally protected status. \n \nEEO is the Law. Applicants to and employees of Michael Baker International are protected under Federal law from discrimination. \n \n\n * It is unlawful in Massachusetts to require or administer a lie detector test as a condition of employment or continued employment. An employer who violates this law shall be subject to criminal penalties and civil liability.\n * There is no current application deadline. Michael Baker will continue to accept applications on an ongoing basis until the position is filled or no longer needed. \n \n\n **About The Team \n \n** WATER RESOURCES PRACTICE \n \nMichael Baker International’s Water Group provides innovative consulting, planning and engineering solutions for the entire spectrum of the water cycle. We have proven experience in providing a full range of professional services from scientific and technical analysis, concept through design, and construction support services. Protection and management of water resources starts at the watershed level and follows the movement of water through urban and agricultural areas, streams, lakes and reservoirs, water distribution systems, wastewater collection systems, and water/wastewater treatment plants. \n \n\nShow more Show less \n * ### Seniority level \nMid-Senior level \n * ### Employment type \nFull-time \n * ### Job function \nEngineering \n * ### Industries \nCivil Engineering, Engineering Services, and Air, Water, and Waste Program Management \n\nReferrals increase your chances of interviewing at Michael Baker International by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D164971&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral lto-networks-4387578595&trk=public_jobs_ellipsis-menu-semaphore-sign-in-redirect&guestReportContentType=JOB&_f=guest-reporting)\n\n**Description \n \n** Build Skills. Build Community. Intern with Public Works. \n \n **City of Palo Alto 2026 Summer Internship Program – Public Works Department \n \n** This summer, don’t just intern — contribute to projects that shape a city. \n \nThe City of Palo Alto’s Public Works Department is offering **12 paid internship opportunities** for students ready to apply their knowledge in real-world settings. \n \nPublic Works powers the systems that keep Palo Alto running — from sustainability and watershed protection to streets, facilities, and wastewater infrastructure modernization. Our work protects public health, strengthens resilience, and supports one of the most innovative and civically engaged communities in the country. \n \nIf you’re studying engineering, environmental science, sustainability, infrastructure, laboratory sciences, or a related field, this is where classroom theory becomes practical impact. \n \n _Learn more about the Public Works department_ here. \n \n **Why Intern with Public Works? \n \n**\n * Contribute to active projects that affect daily life — not just observe them.\n * Be mentored by experienced engineers, environmental professionals, and municipal leaders.\n * See how major infrastructure investments, climate initiatives, and capital improvement projects move from planning to implementation. \n \n\nPublic Works is proud to be the first department in Silicon Valley accredited by the American Public Works Association — and as an intern, you become part of that legacy of professional excellence. \n \n ** _2026 Public Works Internship Opportunities \n \n_** **Watershed Protection – Stormwater & Pollution Prevention Intern \n \n**Help protect Palo Alto’s creeks and the San Francisco Bay. \n \n\n * Support stormwater pollution prevention and green infrastructure projects\n * Develop educational outreach materials\n * Assist with public tours of the Regional Water Quality Control Plant\n * Lead a weekly environmental education activity\n * Gain exposure to environmental regulations and science communication \n \n\n _Learn more about Watershed Protection_ here. \n \n **Office of Sustainability Intern \n \n** Support implementation of Palo Alto’s Sustainability and Climate Action Plan. \n \n\n * Assist with cross-departmental sustainability and climate action programs\n * Draft digital and print outreach materials\n * Support community engagement efforts\n * Assist with data tracking and program coordination\n * Contribute to public-facing sustainability communications \n \n\n _Learn more about Sustainability_ here. \n \n **Zero Waste – Environmental Services Intern \n \n** Advance waste reduction and recycling initiatives. \n \n\n * Support waste diversion and hazardous waste programs\n * Analyze program data\n * Conduct field inspections\n * Engage with the community on sustainability practices \n \n\n _Learn more about Zero Waste_ here. \n \n **Regional Water Quality Control Plant – Technologist Intern \n \n**\n * Assist with SCADA system integration and operational support\n * Work alongside plant staff on automation and technical systems\n * Apply classroom knowledge to municipal-scale infrastructure \n \n\n **Regional Water Quality Control Plant – Laboratory Intern \n \n**\n * Support sample tracking and QA/QC documentation\n * Compile analytical data for regulatory compliance\n * Observe water and wastewater testing procedures\n * Apply professional laboratory safety standards \n \n\n _Learn more about the Regional Water Quality Control Plant_ here. \n \n **Engineering Services Division Internships \n \n**\n * Engineering internships are posted separately. To apply, please submit your application here \n \n\nPublic Works’ Engineering Services Division is offering **seven additional internship opportunities** supporting active capital improvement projects across the City. \n \nEngineering interns gain hands-on experience reviewing contractor documentation, assisting with field work, participating in project coordination, and observing how large-scale municipal infrastructure projects are delivered. \n \n **2026 Engineering Opportunities Include \n \n**\n * Streets & Sidewalks (Transportation and Capital Maintenance Projects)\n * Structures & Grounds (Facilities and Capital Improvement Projects)\n * Storm Drain Systems (Flood Mitigation and Infrastructure Improvement Projects)\n * RWQCP Infrastructure Management (Asset Management & Preventive Maintenance)\n * RWQCP Engineering (Capital Improvements Program – $400M Modernization) \n \n\nIdeal for students in civil engineering, environmental engineering, transportation engineering, construction management, or related disciplines. \n \nEngineering applicants must apply through the separate posting linked above. \n \n **What You’ll Gain \n \n**\n * Hands-on experience in infrastructure, sustainability, and environmental operations\n * Direct exposure to city leadership and public decision-making\n * Professional mentorship from experienced staff\n * Skill development in research, communications, technical analysis, and project coordination\n * Networking opportunities with professionals and fellow interns\n * The opportunity to contribute to projects with visible community impact \n \n\n **Internship Highlights & Cohort Experience \n \n**All Public Works interns participate in the City of Palo Alto’s structured 2026 Summer Internship Program, which includes: \n \n\n * City Orientation and Tour\n * Leadership Development Workshops\n * Networking Events\n * Industry Panels and Q&A Sessions\n * Site Visits and Field Experiences\n * Closing Ceremony and Reception \n \n\nThis program is intentionally designed to provide both practical experience and professional growth. You will not simply support projects — you will help move them forward. \n \nEnvironmental and sustainability-focused Public Works internships are available through this posting. \n \nEngineering internships require a separate application using the link provided above. \n \n _Build your skills. Strengthen your community. Shape the future of Palo Alto. \n \n_ This is a non-benefited position. \n \n01 \n \nWhich position are you applying for? \n \n02 \n \nWhat is your availability like for this summer? Please provide specific dates and any potential scheduling constraints. \n \n03 \n \nWhat degree are you currently working towards? \n \n04 \n \nAre you a undergraduate or graduate student? \n \n05 \n \nBriefly, why are you interested in interning with us this summer? What skills or experiences do you hope to gain from this opportunity? \n \n\n * Required Question\n\nShow more Show less \n * ### Seniority level \nInternship \n * ### Employment type \nFull-time \n * ### Job function \nFinance and Sales \n * ### Industries \nComputer and Network Security \n\nReferrals increase your chances of interviewing at Palo Alto Networks by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D30086&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified about new Public Works Specialist jobs in **Palo Alto, CA**. \n[ Sign in to create job alert ](https://www.linkedin.com/login?emailAddress=&fromSignIn=&session_redirect=https%3A%2F%2Fwww.linkedin.com%2Fjobs%2Fview%2Fpublic-works-dept-intern-various-positions-at-palo-alto-networks-4387578595%3Fposition%3D6%26pageNum%3D0%26refId%3DL15VxMG8eQHcS6onQldMFA%253D%253D%26trackingId%3DST3TYfKRFHl96bIzYYaJMg%253D%253D&trk=public_jobs_job-alert-guest-redirect-cta)\n`` `` ``\n##"}, {"job_title": "Civil or Environmental Engineer", "company_name": "SC&A, Inc.", "city": "美国\n2 周前", "state": "", "employment_type": "FULL_TIME", "salary_currency": null, "salary_min": null, "salary_max": null, "salary_interval": null, "posted_date": "", "description_text": "Overview \n \n** SC&A, Inc. is an environmental consulting firm that supports federal, state, tribal, and private industry in protecting public health, improving community infrastructure, and maintaining environmental compliance. SC&A is looking for applicants who have experience with environmental remediation, water and wastewater system evaluation, environmental assessments, and regulatory compliance to join our team. \n \nPosition Summary \n \nMake a difference from day one. SC&A is seeking an **experienced, licensed engineer** who is ready to apply technical skills to projects that improve drinking water systems, optimize wastewater treatment operations, and support infrastructure that matters to communities. \n \nThis is a field-oriented engineering role where you’ll apply your engineering experience to hands-on projects involving design, analysis, and regulatory compliance activities. If you value purpose-driven work, continuous learning, and solving practical engineering problems, please consider applying! \n \nKey Responsibilities \n \n\n * Lead and support investigations, infrastructure assessments, and environmental remediation projects both on site and from your remote/work-from-home office \n * Conduct engineering analyses related to water, wastewater, stormwater, and environmental systems\n * Conduct field data collection, system inspections, sampling, and testing\n * Prepare and review technical reports, design documents, and regulatory submittals\n * Support remedial design and implementation activities under RCRA, CERCLA, and related regulatory frameworks\n * Coordinate with project teams, regulatory agencies, and stakeholders\n * Perform field oversight, data collection, and contractor/subcontractor coordination as needed\n * Work collaboratively on multi-disciplinary project teams both in the field and in remote/work-from-home settings \n \n\n **Qualifications \n \n**\n * Bachelor’s degree in civil engineering, environmental engineering, or related engineering discipline from an accredited institution\n * Professional Engineer (PE) license\n * Minimum of five (5) years of relevant experience (including internships, co-ops, or related project experience) in environmental consulting, infrastructure projects, remediation, or water/wastewater systems\n * Demonstrated experience preparing engineering calculations and technical reports\n * Working knowledge of environmental regulations, including RCRA and CERCLA, preferred\n * Experience with water, wastewater, stormwater, and/or environmental system evaluation and design\n * Strong analytical, problem-solving, and project coordination skills\n * Willingness to perform fieldwork and travel to project sites as required \n \n\nThe salary range for this position is $90,000-$150,000, DOE/DOQ. \n \n _ **SC &A does not accept third-party applications or agency inquiries. Phone calls are not accepted for any position. \n \n**__Job descriptions are not intended as and do not create employment contracts. SC &A maintains its status as an at-will employer. Employees can be terminated for any reason not prohibited by law. Candidates are required to pass a background screening prior to employment. \n \n_Powered by JazzHR \n \nARPPMWhaCo \nShow more Show less \n * ### Seniority level \nMid-Senior level \n * ### Employment type \nFull-time \n * ### Job function \nEngineering and Information Technology \n * ### Industries \nInternet Publishing \n\nReferrals increase your chances of interviewing at SC&A, Inc. by 2x\n[ See who you know ](https://www.linkedin.com/login?session_redirect=https%3A%2F%2Fwww%2Elinkedin%2Ecom%2Fsearch%2Fresults%2Fpeople%2F%3FfacetCurrentCompany%3D155299&emailAddress=&fromSignIn=&trk=public_jobs_find-a-referral-cta)\nGet notified when a new job is posted.\nSet alert \n## Sign in to set job alerts for “Civil Environmental Engineer” roles. \n`` `` `` `` `` ``\nEmail or phone \nPassword \nShow\n[Forgot password?](https://www.linkedin.com/
